                                  style={{ width: "100%", padding: "8px 10px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 14, boxSizing: "border-box", textAlign: "right" }} />
                                <div style={{ fontSize: 10, color: "#9ca3af", marginTop: 2 }}>Pack: Rs.{packPrice.toFixed(2)}/{packUnits} {unitName}</div>
                              </div>
                            </div>

                            {/* Line total + profit */}
                            {enteredQty > 0 && (
                              <div style={{ marginTop: 8, padding: "8px 12px", background: "#f0fdf4", borderRadius: 8, border: "1px solid #bbf7d0" }}>
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                  <span style={{ fontSize: 11, color: "#374151" }}>
                                    {overflowQty > 0 && nextBatch
                                      ? `${batch1Qty}×${effectiveUnitPrice.toFixed(2)} + ${overflowQty}×${nextUnitPrice.toFixed(2)}`
                                      : `${enteredQty} × Rs.${effectiveUnitPrice.toFixed(2)}`}
                                  </span>
                                  <span style={{ fontWeight: 800, fontSize: 16, color: "#059669" }}>
                                    Rs. {lineTotal.toLocaleString("en-LK", { minimumFractionDigits: 2 })}
                                  </span>
                                </div>
                                <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4, fontSize: 11 }}>
                                  <span style={{ color: "#6b7280" }}>Cost: Rs.{totalCost.toFixed(2)}</span>
                                  <span style={{ fontWeight: 700, color: profit >= 0 ? "#059669" : "#dc2626" }}>
                                    Profit: Rs.{profit.toFixed(2)} ({totalCost > 0 ? ((profit/totalCost)*100).toFixed(1) : 0}%)
                                  </span>
                                </div>
                              </div>
                            )}
                          </>);
                        })()}

                          return (<>
                            {/* Batch selector */}
                            {batches.length > 0 && (
                      </div>
                    );
                  })}
                </div>

                {/* Payment + Total */}
                <div style={{ background: "#fff", borderRadius: 12, padding: 14, marginBottom: 14, border: "1px solid #e5e7eb" }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#059669", marginBottom: 10, letterSpacing: 1 }}>PAYMENT METHOD</div>
                  <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
                    {[{ key: "cash", label: "💵 Cash", c: "#059669" }, { key: "card", label: "💳 Card", c: "#1d4ed8" }, { key: "transfer", label: "🏦 Transfer", c: "#7c3aed" }, { key: "credit", label: "📋 Credit", c: "#d97706" }].map(p => (
                      <button key={p.key} onClick={() => setForm({ ...form, paymentMethod: p.key })}
                        style={{ flex: 1, padding: "8px 4px", borderRadius: 8, cursor: "pointer", fontWeight: 700, fontSize: 11,
                          border: form.paymentMethod === p.key ? `2px solid ${p.c}` : "1px solid #e5e7eb",
                          background: form.paymentMethod === p.key ? p.c : "#f9fafb",
                          color: form.paymentMethod === p.key ? "#fff" : "#374151" }}>
                        {p.label}
                      </button>
                    ))}
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 0", borderTop: "2px solid #f0f0f0" }}>
                    <span style={{ fontWeight: 700, fontSize: 16 }}>TOTAL</span>
                    <span style={{ fontWeight: 800, fontSize: 22, color: "#059669" }}>Rs. {invTotal.toLocaleString("en-LK", { minimumFractionDigits: 2 })}</span>
                  </div>
                </div>

                {/* Actions */}
                <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
                  <button onClick={() => { setModal(null); setLines([]); setForm({}); }}
                    style={{ padding: "10px 24px", borderRadius: 8, border: "1px solid #e5e7eb", background: "#fff", cursor: "pointer", fontWeight: 600, fontSize: 14 }}>Cancel</button>
                  <button onClick={saveInvoice} disabled={lines.filter(l => l.itemId).length === 0}
                    style={{ padding: "10px 28px", borderRadius: 8, border: "none", background: lines.filter(l => l.itemId).length === 0 ? "#9ca3af" : "#059669", color: "#fff", cursor: "pointer", fontWeight: 700, fontSize: 14 }}>
                    ✅ Save Invoice
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Stock Adj Modal */}
      {modal === "stockAdj" && (
        <Modal title="Stock Adjustment" onClose={() => { setModal(null); setForm({}); }}>
          <Select label="Item" value={form.itemId || ""} onChange={e => setForm({ ...form, itemId: e.target.value })}>
            <option value="">Select item...</option>
            {db.items.map(i => <option key={i.id} value={i.id}>[{i.itemCode}] {i.brandName} {i.strength} (Stock: {getStock(i.id)})</option>)}
          </Select>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <Select label="Type" value={form.type || "in"} onChange={e => setForm({ ...form, type: e.target.value })}>
              <option value="in">Stock In (+)</option>
              <option value="out">Stock Out (-)</option>
            </Select>
            <Input label="Quantity" type="number" value={form.qty || ""} onChange={e => setForm({ ...form, qty: e.target.value })} />
          </div>
          <Select label="Reason" value={form.reason || ""} onChange={e => setForm({ ...form, reason: e.target.value })}>
            <option value="">Select reason...</option>
            {["Damage", "Expiry", "Theft", "Recount", "Transfer", "Sample", "Other"].map(r => <option key={r}>{r}</option>)}
          </Select>
          <Input label="Notes" value={form.notes || ""} onChange={e => setForm({ ...form, notes: e.target.value })} />
          <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 12 }}>
            <Btn color="ghost" onClick={() => { setModal(null); setForm({}); }}>Cancel</Btn>
            <Btn color="warn" onClick={saveStockAdj}>Save Adjustment</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
};

// Reports Page
const ReportsPage = ({ db }) => {
  const [tab, setTab] = useState("sales");
  const [dateFrom, setDateFrom] = useState(new Date(new Date().setDate(1)).toISOString().split("T")[0]);
  const [dateTo, setDateTo] = useState(today());

  const tabs = [
    { key: "sales", label: "Sales" }, { key: "orders", label: "Orders" },
    { key: "suppliers", label: "Suppliers" }, { key: "items", label: "Items" },
    { key: "stock", label: "Stock" }, { key: "expiry", label: "Expiry" },
    { key: "profit", label: "P&L" }, { key: "movement", label: "Movement" },
    { key: "daily", label: "Daily" }, { key: "cashflow", label: "Cash Flow" },
  ];

  const filteredInv = db.invoices.filter(i => i.date >= dateFrom && i.date <= dateTo);
  const totalSales = filteredInv.reduce((a, b) => a + b.total, 0);

  const getItemName = (id) => { const it = db.items.find(i => i.id === id); return it ? `${it.brandName || it.genericName} ${it.strength || ""}`.trim() : id; };
  const getCostPrice = (id) => db.items.find(i => i.id === id)?.costPrice || 0;

  // Profit calc
  const profitData = filteredInv.map(inv => {
    const revenue = inv.total;
    const cost = (inv.lines || []).reduce((a, l) => a + (+l.qty * getCostPrice(l.itemId)), 0);
    return { ...inv, revenue, cost, profit: revenue - cost };
  });
  const totalRevenue = profitData.reduce((a, b) => a + b.revenue, 0);
  const totalCost = profitData.reduce((a, b) => a + b.cost, 0);
  const totalProfit = totalRevenue - totalCost;

  // Expiry report
  const now = new Date();
  const expiryStockItems = db.stock.map(s => {
    const item = db.items.find(i => i.id === s.itemId);
    const m = months(s.expiry);
    return { ...s, itemName: item?.name, monthsLeft: m };
  }).filter(s => s.qty > 0);

  // Item movement
  const itemMovement = db.items.map(it => {
    const sold = filteredInv.flatMap(inv => inv.lines || []).filter(l => l.itemId === it.id).reduce((a, l) => a + (+l.qty || 0), 0);
    const received = db.grn.filter(g => g.date >= dateFrom && g.date <= dateTo).flatMap(g => g.lines || []).filter(l => l.itemId === it.id).reduce((a, l) => a + (+l.qty || 0), 0);
    const stock = db.stock.filter(s => s.itemId === it.id).reduce((a, b) => a + b.qty, 0);
    return { id: it.id, name: it.brandName, brandName: it.brandName, genericName: it.genericName, strength: it.strength, sold, received, currentStock: stock };
  });

  // Daily sales
  const dailySales = {};
  filteredInv.forEach(inv => { dailySales[inv.date] = (dailySales[inv.date] || 0) + inv.total; });
  const dailyRows = Object.entries(dailySales).sort().map(([date, total]) => ({ date, total, count: filteredInv.filter(i => i.date === date).length }));

  // Cash flow
  const cashIn = filteredInv.filter(i => i.paymentMethod !== "credit").reduce((a, b) => a + b.total, 0);
  const cashOut = db.grn.filter(g => g.date >= dateFrom && g.date <= dateTo).reduce((a, b) => a + b.total, 0);

  const StatBox = ({ label, value, color }) => (
    <div style={{ background: "#fff", padding: 16, borderRadius: 10, textAlign: "center", flex: 1, minWidth: 120, boxShadow: "0 1px 4px rgba(0,0,0,.07)" }}>
      <div style={{ fontSize: 11, color: "#6b7280", marginBottom: 4 }}>{label}</div>
      <div style={{ fontSize: 18, fontWeight: 700, color: color || "#111" }}>{value}</div>
    </div>
  );

  return (
    <div>
      <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
        <Input label="From" type="date" value={dateFrom} onChange={e => setDateFrom(e.target.value)} style={{ width: 140 }} />
        <Input label="To" type="date" value={dateTo} onChange={e => setDateTo(e.target.value)} style={{ width: 140 }} />
      </div>
      <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap" }}>
        {tabs.map(t => (
          <button key={t.key} onClick={() => setTab(t.key)}
            style={{ padding: "5px 10px", borderRadius: 16, border: "none", cursor: "pointer", fontWeight: 600, fontSize: 11,
              background: tab === t.key ? "#1d4ed8" : "#f3f4f6", color: tab === t.key ? "#fff" : "#374151" }}>
            {t.label}
          </button>
        ))}
      </div>

      {tab === "sales" && (<>
        <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
          <StatBox label="Total Sales" value={fmt(totalSales)} color="#059669" />
          <StatBox label="Transactions" value={filteredInv.length} color="#1d4ed8" />
          <StatBox label="Avg Sale" value={fmt(filteredInv.length ? totalSales / filteredInv.length : 0)} />
        </div>
        <Table cols={[
          { key: "id", label: "Invoice" }, { key: "date", label: "Date" },
          { key: "customerId", label: "Customer", render: r => db.customers.find(c => c.id === r.customerId)?.name || "Walk-in" },
          { key: "total", label: "Total", render: r => fmt(r.total) },
          { key: "paymentMethod", label: "Payment" },
        ]} rows={filteredInv} />
      </>)}

      {tab === "orders" && (<>
        <div style={{ fontSize: 12, color: "#6b7280", marginBottom: 12 }}>
          Tick a pending order to convert it to an invoice. Red items = insufficient stock.
        </div>
        {(db.orders || []).length === 0
          ? <Card><p style={{ textAlign: "center", color: "#9ca3af" }}>No orders yet</p></Card>
          : (db.orders || []).map(order => {
            const isPending = order.status === "pending";
            const itemsWithStock = (order.items || []).map(li => ({
              ...li,
              availStock: getStock(li.itemId),
              insufficient: getStock(li.itemId) < (+li.qty || 0),
            }));
            const hasStockIssue = itemsWithStock.some(x => x.insufficient);

            return (
              <Card key={order.id} style={{ border: isPending ? "2px solid #f59e0b" : "1px solid #e5e7eb" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                  <div>
                    <span style={{ fontFamily: "monospace", fontWeight: 800, color: "#1e3a8a" }}>{order.id}</span>
                    <span style={{ marginLeft: 10, fontSize: 12, color: "#6b7280" }}>{order.date}</span>
                    {db.customers.find(c => c.id === order.customerId) && (
                      <div style={{ fontSize: 12, color: "#374151", marginTop: 2 }}>
                        👤 {db.customers.find(c => c.id === order.customerId)?.name}
                      </div>
                    )}
                  </div>
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <Badge color={order.status === "completed" ? "green" : order.status === "pending" ? "yellow" : "blue"}>{order.status}</Badge>
                    {isPending && (
                      <button
                        onClick={async () => {
                          if (!confirm(`Convert Order ${order.id} to Invoice?`)) return;
                          const invLines = order.items.map(li => ({ itemId: li.itemId, qty: li.qty, sellingPrice: li.price || db.items.find(x => x.id === li.itemId)?.sellingPrice || 0 }));
                          const invTotal = invLines.reduce((a, l) => a + (+l.qty || 0) * (+l.sellingPrice || 0), 0);
                          const inv = { id: "INV" + uid(), date: today(), customerId: order.customerId || null, total: invTotal, lines: invLines, status: "paid", paymentMethod: "cash", fromOrderId: order.id };
                          const newDb = { ...db };
                          newDb.invoices = [...db.invoices, inv];
                          // Deduct stock FIFO
                          for (const l of invLines) {
                            let rem = +l.qty;
                            const batches = newDb.stock.filter(s => s.itemId === l.itemId).sort((a, b) => a.expiry < b.expiry ? -1 : 1);
                            for (const b of batches) {
                              if (rem <= 0) break;
                              const take = Math.min(b.qty, rem);
                              newDb.stock = newDb.stock.map(s => s.id === b.id ? { ...s, qty: s.qty - take } : s);
                              rem -= take;
                            }
                          }
                          newDb.orders = newDb.orders.map(o => o.id === order.id ? { ...o, status: "completed", invoiceId: inv.id } : o);
                          await saveDB(newDb); setDb(newDb);
                          alert(`✅ Invoice ${inv.id} created from Order ${order.id}`);
                        }}
                        style={{ padding: "6px 12px", background: hasStockIssue ? "#d97706" : "#059669", color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 12, fontWeight: 700 }}>
                        ✅ Convert to Invoice
                      </button>
                    )}
                  </div>
                </div>

                {/* Order items with stock check */}
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  {itemsWithStock.map((li, idx) => {
                    const it = db.items.find(x => x.id === li.itemId);
                    return (
                      <div key={idx} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 10px", borderRadius: 8, background: li.insufficient ? "#fee2e2" : "#f9fafb", border: `1px solid ${li.insufficient ? "#fca5a5" : "#e5e7eb"}` }}>
                        <div>
                          <span style={{ fontWeight: 700, fontSize: 13, color: li.insufficient ? "#dc2626" : "#111" }}>
                            {li.insufficient ? "🔴 " : "🟢 "}
                            {it ? `${it.brandName} ${it.strength}` : li.name || li.itemId}
                          </span>
                          <span style={{ fontSize: 11, color: "#6b7280", marginLeft: 8 }}>× {li.qty}</span>
                        </div>
                        <div style={{ textAlign: "right" }}>
                          {li.insufficient && (
                            <div style={{ fontSize: 10, color: "#dc2626", fontWeight: 700 }}>Only {li.availStock} in stock!</div>
                          )}
                          <div style={{ fontSize: 12, fontWeight: 700, color: li.insufficient ? "#dc2626" : "#059669" }}>{fmt((li.price || 0) * li.qty)}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>

                <div style={{ display: "flex", justifyContent: "space-between", marginTop: 10, paddingTop: 8, borderTop: "1px solid #f0f0f0" }}>
                  <span style={{ fontSize: 12, color: "#6b7280" }}>{(order.items || []).length} items</span>
                  <span style={{ fontWeight: 800, fontSize: 15, color: "#059669" }}>{fmt(order.total)}</span>
                </div>
              </Card>
            );
          })
        }
      </>)}

      {tab === "suppliers" && (
        <Table cols={[
          { key: "id", label: "GRN No." }, { key: "date", label: "Date" },
          { key: "supplierId", label: "Supplier", render: r => db.suppliers.find(s => s.id === r.supplierId)?.name || r.supplierId },
          { key: "total", label: "Amount", render: r => fmt(r.total) },
        ]} rows={db.grn.filter(g => g.date >= dateFrom && g.date <= dateTo)} />
      )}

      {tab === "items" && (
        <Table cols={[
          { key: "itemCode", label: "Code", render: r => <span style={{ fontFamily: "monospace", fontSize: 12, fontWeight: 700 }}>{r.itemCode}</span> },
          { key: "brandName", label: "Brand Name", render: r => <span style={{ fontWeight: 700 }}>{r.brandName}</span> },
          { key: "strength", label: "Strength", render: r => <Badge color="blue">{r.strength}</Badge> },
          { key: "genericName", label: "Generic Name", render: r => <span style={{ color: "#6b7280" }}>{r.genericName}</span> },
          { key: "dosageForm", label: "Form" },
          { key: "packSize", label: "Pack Size" },
          { key: "costPrice", label: "Cost", render: r => fmt(r.costPrice) },
          { key: "sellingPrice", label: "Price", render: r => fmt(r.sellingPrice) },
          { key: "reorderLevel", label: "Reorder" },
        ]} rows={db.items} />
      )}

      {tab === "stock" && (<>
        <div style={{ display: "flex", gap: 10, marginBottom: 12 }}>
          <StatBox label="Total SKUs" value={db.items.length} />
          <StatBox label="Low Stock" value={db.items.filter(it => db.stock.filter(s => s.itemId === it.id).reduce((a, b) => a + b.qty, 0) < it.reorderLevel).length} color="#dc2626" />
        </div>
        <Table cols={[
          { key: "id", label: "Batch" },
          { key: "itemId", label: "Item", render: r => getItemName(r.itemId) },
          { key: "batchNo", label: "Batch No." },
          { key: "qty", label: "Qty", render: r => <Badge color={r.qty < 10 ? "red" : r.qty < 30 ? "yellow" : "green"}>{r.qty}</Badge> },
          { key: "expiry", label: "Expiry" },
          { key: "location", label: "Location" },
        ]} rows={db.stock} />
      </>)}

      {tab === "expiry" && (<>
        <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
          <Badge color="red">🔴 Expired / &lt;3m</Badge>
          <Badge color="yellow">🟡 3-6 months</Badge>
          <Badge color="green">🟢 Safe &gt;6m</Badge>
        </div>
        <Table cols={[
          { key: "itemName", label: "Item" }, { key: "batchNo", label: "Batch" }, { key: "qty", label: "Qty" },
          { key: "expiry", label: "Expiry" },
          { key: "monthsLeft", label: "Months Left", render: r => <Badge color={r.monthsLeft < 3 ? "red" : r.monthsLeft < 6 ? "yellow" : "green"}>{r.monthsLeft < 0 ? "EXPIRED" : `${r.monthsLeft}m`}</Badge> },
        ]} rows={expiryStockItems.sort((a, b) => a.monthsLeft - b.monthsLeft)} />
      </>)}

      {tab === "profit" && (<>
        <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
          <StatBox label="Revenue" value={fmt(totalRevenue)} color="#059669" />
          <StatBox label="Cost" value={fmt(totalCost)} color="#dc2626" />
          <StatBox label="Gross Profit" value={fmt(totalProfit)} color={totalProfit >= 0 ? "#059669" : "#dc2626"} />
          <StatBox label="Margin" value={totalRevenue ? `${((totalProfit / totalRevenue) * 100).toFixed(1)}%` : "0%"} />
        </div>
        <Table cols={[
          { key: "id", label: "Invoice" }, { key: "date", label: "Date" },
          { key: "revenue", label: "Revenue", render: r => fmt(r.revenue) },
          { key: "cost", label: "Cost", render: r => fmt(r.cost) },
          { key: "profit", label: "Profit", render: r => <span style={{ color: r.profit >= 0 ? "#059669" : "#dc2626" }}>{fmt(r.profit)}</span> },
        ]} rows={profitData} />
      </>)}

      {tab === "movement" && (
        <Table cols={[
          { key: "name", label: "Item", render: r => <div><span style={{ fontWeight: 700 }}>{r.brandName}</span> <Badge color="blue">{r.strength}</Badge><div style={{ fontSize: 11, color: "#9ca3af" }}>{r.genericName}</div></div> },
          { key: "received", label: "Received", render: r => <Badge color="blue">{r.received}</Badge> },
          { key: "sold", label: "Sold", render: r => <Badge color="green">{r.sold}</Badge> },
          { key: "currentStock", label: "Current Stock", render: r => <Badge color={r.currentStock < 10 ? "red" : "green"}>{r.currentStock}</Badge> },
        ]} rows={itemMovement} />
      )}

      {tab === "daily" && (<>
        <div style={{ display: "flex", gap: 10, marginBottom: 12, flexWrap: "wrap" }}>
          <StatBox label="Total Sales" value={fmt(totalSales)} color="#059669" />
          <StatBox label="Days Active" value={dailyRows.length} />
        </div>
        <Table cols={[
          { key: "date", label: "Date" },
          { key: "count", label: "Transactions" },
          { key: "total", label: "Sales", render: r => fmt(r.total) },
        ]} rows={dailyRows} />
      </>)}

      {tab === "cashflow" && (<>
        <div style={{ display: "flex", gap: 10, marginBottom: 12, flexWrap: "wrap" }}>
          <StatBox label="Cash In (Sales)" value={fmt(cashIn)} color="#059669" />
          <StatBox label="Cash Out (Purchases)" value={fmt(cashOut)} color="#dc2626" />
          <StatBox label="Net Flow" value={fmt(cashIn - cashOut)} color={cashIn - cashOut >= 0 ? "#059669" : "#dc2626"} />
        </div>
        <Card>
          <div style={{ fontWeight: 700, marginBottom: 8 }}>Cash Inflows (Paid Sales)</div>
          <Table cols={[
            { key: "date", label: "Date" }, { key: "id", label: "Ref" },
            { key: "total", label: "Amount", render: r => <span style={{ color: "#059669" }}>+{fmt(r.total)}</span> },
            { key: "paymentMethod", label: "Method" },
          ]} rows={filteredInv.filter(i => i.paymentMethod !== "credit")} />
        </Card>
        <Card>
          <div style={{ fontWeight: 700, marginBottom: 8 }}>Cash Outflows (GRN Payments)</div>
          <Table cols={[
            { key: "date", label: "Date" }, { key: "id", label: "GRN" },
            { key: "total", label: "Amount", render: r => <span style={{ color: "#dc2626" }}>-{fmt(r.total)}</span> },
          ]} rows={db.grn.filter(g => g.date >= dateFrom && g.date <= dateTo)} />
        </Card>
      </>)}
    </div>
  );
};

// ─── CUSTOMER PAGES ───────────────────────────────────────────────────────────
const CustomerOrderPage = ({ db, setDb, cart, setCart, custId }) => {
  const [search, setSearch] = useState("");
  const [tab, setTab] = useState("browse");
  const [lastOrderCount, setLastOrderCount] = useState((db.orders || []).length);

  // Poll for new orders every 10s (staff uses same localStorage)
  useEffect(() => {
    const interval = setInterval(async () => {
      const fresh = await loadDB();
      if (fresh) {
        const newCount = (fresh.orders || []).length;
        if (newCount > lastOrderCount) {
          setLastOrderCount(newCount);
          setDb(fresh);
        }
      }
    }, 10000);
    return () => clearInterval(interval);
  }, [lastOrderCount]);

  const getStock = (itemId) => db.stock.filter(s => s.itemId === itemId).reduce((a, b) => a + b.qty, 0);
  const filtered = db.items.filter(i => {
    const q = search.toLowerCase();
    return (i.genericName || "").toLowerCase().includes(q) ||
      (i.brandName  || "").toLowerCase().includes(q) ||
      (i.dosageForm || "").toLowerCase().includes(q) ||
      (i.strength   || "").toLowerCase().includes(q);
  });

  const addToCart = (item) => {
    const existing = cart.find(c => c.itemId === item.id);
    if (existing) {
      setCart(cart.map(c => c.itemId === item.id ? { ...c, qty: c.qty + 1 } : c));
    } else {
      setCart([...cart, { itemId: item.id, name: item.name, price: item.sellingPrice, qty: 1, unit: item.unit }]);
    }
  };

  const cartTotal = cart.reduce((a, b) => a + b.qty * b.price, 0);

  const playOrderSound = () => {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [523, 659, 784, 1046].forEach((freq, i) => {
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq; osc.type = "sine";
        const t = ctx.currentTime + i * 0.15;
        gain.gain.setValueAtTime(0.25, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
        osc.start(t); osc.stop(t + 0.25);
      });
    } catch(e) {}
  };

  const placeOrder = async () => {
    if (cart.length === 0) return;
    const order = {
      id: "ORD" + uid(), date: today(), customerId: custId || null,
      items: cart.map(c => ({ ...c, itemId: c.itemId || c.id })),
      total: cartTotal, status: "pending",
    };
    const newDb = { ...db, orders: [...(db.orders || []), order] };
    await saveDB(newDb); setDb(newDb); setCart([]);
    playOrderSound();
    setLastOrderCount(newDb.orders.length);
    alert(`✅ Order ${order.id} placed!\nPharmacy will contact you soon.`);
    setTab("history");
  };

  return (
    <div>
      <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
        {[{ key: "browse", label: "Browse Items" }, { key: "ai", label: "AI Assistant" }, { key: "cart", label: `Cart (${cart.length})` }, { key: "history", label: "My Orders" }].map(t => (
          <button key={t.key} onClick={() => setTab(t.key)}
            style={{ padding: "6px 12px", borderRadius: 20, border: "none", cursor: "pointer", fontWeight: 600, fontSize: 12,
              background: tab === t.key ? "#059669" : "#f3f4f6", color: tab === t.key ? "#fff" : "#374151" }}>
            {t.label}
          </button>
        ))}
      </div>

      {tab === "browse" && (<>
        <div style={{ position: "relative", marginBottom: 12 }}>
          <span style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)" }}>🔍</span>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search medicines..."
            style={{ width: "100%", padding: "10px 12px 10px 34px", border: "1px solid #e5e7eb", borderRadius: 10, fontSize: 14, boxSizing: "border-box" }} />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 10 }}>
          {filtered.map(item => {
            const stock = getStock(item.id);
            const inCart = cart.find(c => c.itemId === item.id);
            return (
              <div key={item.id} style={{ background: "#fff", borderRadius: 12, padding: 14, boxShadow: "0 1px 4px rgba(0,0,0,.08)", border: stock === 0 ? "1px solid #fee2e2" : "1px solid #f3f4f6" }}>
                <div style={{ fontSize: 28, marginBottom: 6, textAlign: "center" }}>💊</div>
                <div style={{ fontWeight: 800, fontSize: 14, marginBottom: 2, color: "#1d4ed8" }}>{item.brandName}</div>
                <div style={{ fontSize: 12, fontWeight: 600, color: "#374151", marginBottom: 2 }}>{item.strength} {item.dosageForm}</div>
                <div style={{ fontSize: 11, color: "#9ca3af", marginBottom: 4 }}>{item.genericName}</div>
                <div style={{ fontSize: 11, color: "#059669", marginBottom: 6, fontWeight: 600 }}>{item.packSize}</div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                  <span style={{ fontWeight: 700, color: "#059669" }}>{fmt(item.sellingPrice)}</span>
                  <Badge color={stock === 0 ? "red" : stock < 10 ? "yellow" : "green"}>
                    {stock === 0 ? "Out of Stock" : `${stock} in stock`}
                  </Badge>
                </div>
                {stock > 0 ? (
                  <button onClick={() => addToCart(item)} style={{
                    width: "100%", padding: "7px", borderRadius: 8, border: "none", cursor: "pointer",
                    background: inCart ? "#d1fae5" : "#059669", color: inCart ? "#065f46" : "#fff", fontWeight: 600, fontSize: 13,
                  }}>{inCart ? `✓ In Cart (${inCart.qty})` : "Add to Cart"}</button>
                ) : (
                  <div style={{ textAlign: "center", color: "#dc2626", fontSize: 12, fontWeight: 600 }}>Currently Unavailable</div>
                )}
              </div>
            );
          })}
        </div>
      </>)}

      {tab === "ai" && (
        <Card>
          <div style={{ fontWeight: 700, marginBottom: 12, color: "#059669" }}>💬 AI Pharmacy Assistant</div>
          <AIAssistant db={db} onAddToCart={addToCart} />
        </Card>
      )}

      {tab === "cart" && (<>
        {cart.length === 0 ? (
          <Card><p style={{ textAlign: "center", color: "#9ca3af" }}>Your cart is empty. Browse items to add!</p></Card>
        ) : (<>
          {cart.map((c, i) => (
            <Card key={i}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontWeight: 600 }}>{c.name}</div>
                  <div style={{ fontSize: 12, color: "#6b7280" }}>{fmt(c.price)} × {c.qty} {c.unit}</div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontWeight: 700, color: "#059669" }}>{fmt(c.price * c.qty)}</span>
                  <div style={{ display: "flex", gap: 4 }}>
                    <button onClick={() => setCart(cart.map(x => x.itemId === c.itemId ? { ...x, qty: Math.max(1, x.qty - 1) } : x))}
                      style={{ width: 28, height: 28, borderRadius: 6, border: "1px solid #e5e7eb", cursor: "pointer", background: "#f9fafb" }}>−</button>
                    <button onClick={() => setCart(cart.map(x => x.itemId === c.itemId ? { ...x, qty: x.qty + 1 } : x))}
                      style={{ width: 28, height: 28, borderRadius: 6, border: "1px solid #e5e7eb", cursor: "pointer", background: "#f9fafb" }}>+</button>
                    <button onClick={() => setCart(cart.filter(x => x.itemId !== c.itemId))}
                      style={{ width: 28, height: 28, borderRadius: 6, border: "1px solid #fee2e2", cursor: "pointer", background: "#fff5f5", color: "#dc2626" }}>✕</button>
                  </div>
                </div>
              </div>
            </Card>
          ))}
          <Card style={{ background: "#f0fdf4" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontWeight: 700, fontSize: 16 }}>Total</span>
              <span style={{ fontWeight: 700, fontSize: 20, color: "#059669" }}>{fmt(cartTotal)}</span>
            </div>
            <div style={{ marginTop: 12, display: "flex", gap: 8 }}>
              <Btn color="ghost" onClick={() => setCart([])}>Clear Cart</Btn>
              <Btn color="success" onClick={placeOrder} style={{ flex: 1 }}>Place Order via WhatsApp</Btn>
            </div>
          </Card>
        </>)}
      </>)}

      {tab === "history" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {(db.orders || []).filter(o => !custId || o.customerId === custId).length === 0
            ? <Card><p style={{ textAlign: "center", color: "#9ca3af" }}>No orders yet</p></Card>
            : (db.orders || []).filter(o => !custId || o.customerId === custId)
                .sort((a, b) => b.date < a.date ? -1 : 1)
                .map(order => {
                  const inv = order.invoiceId ? db.invoices?.find(i => i.id === order.invoiceId) : null;
                  const statusConfig = {
                    pending:   { color: "#d97706", bg: "#fef3c7", icon: "⏳", label: "Pending — Pharmacy processing" },
                    completed: { color: "#059669", bg: "#d1fae5", icon: "✅", label: "Completed" },
                    cancelled: { color: "#dc2626", bg: "#fee2e2", icon: "❌", label: "Cancelled" },
                  }[order.status] || { color: "#6b7280", bg: "#f3f4f6", icon: "📋", label: order.status };
                  return (
                    <Card key={order.id} style={{ border: `2px solid ${statusConfig.color}` }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                        <span style={{ fontFamily: "monospace", fontWeight: 800, color: "#1e3a8a", fontSize: 13 }}>{order.id}</span>
                        <span style={{ fontSize: 11, color: "#6b7280" }}>{order.date}</span>
                      </div>
                      {/* Status banner */}
                      <div style={{ background: statusConfig.bg, borderRadius: 10, padding: "10px 14px", marginBottom: 10, display: "flex", alignItems: "center", gap: 10 }}>
                        <span style={{ fontSize: 24 }}>{statusConfig.icon}</span>

                            <div style={{ fontSize: 12, color: "#374151", marginTop: 2 }}>Invoice: {inv.id} • Rs.{(+inv.total).toLocaleString("en-LK", { minimumFractionDigits: 2 })}</div>

                          {order.status === "pending" && (
                            <div style={{ fontSize: 11, color: "#92400e", marginTop: 2 }}>We'll contact you via WhatsApp soon 📱</div>
                          )}
                        </div>
                      </div>
                      {/* Items */}
                      <div style={{ display: "flex", flexDirection: "column", gap: 4, marginBottom: 8 }}>
                        {(order.items || []).map((item, idx) => {
                          const it = db.items.find(x => x.id === (item.itemId || item.id));
                          const stockOk = it ? db.stock.filter(s => s.itemId === it.id).reduce((a, b) => a + b.qty, 0) > 0 : true;
                          return (
                            <div key={idx} style={{ display: "flex", justifyContent: "space-between", padding: "5px 8px", background: stockOk ? "#f9fafb" : "#fff5f5", borderRadius: 7, border: `1px solid ${stockOk ? "#e5e7eb" : "#fca5a5"}` }}>

                        <span style={{ fontWeight: 800, fontSize: 16, color: "#059669" }}>Rs.{(+order.total).toLocaleString("en-LK", { minimumFractionDigits: 2 })}</span>
                      </div>
                    </Card>
                  );
                })
          }
        </div>
      )}
    </div>
  );
};

// ─── ACCOUNTING PAGE ─────────────────────────────────────────────────────────
const AccountingPage = ({ db, setDb }) => {
  const [tab, setTab] = useState("overview");
  const [modal, setModal] = useState(null); // "entry" | "account"
  const [form, setForm] = useState({});
  const [filterAcc, setFilterAcc] = useState("");

  const accounts = db.accounts || [];
  const entries = db.accountEntries || [];

  // Totals per account (balance + entries)
  const accBalance = (accId) => {
    const acc = accounts.find(a => a.id === accId);
    const base = acc?.balance || 0;
    const entIncome = entries.filter(e => e.accountId === accId && e.type === "income").reduce((a, b) => a + (+b.amount || 0), 0);
    const entExpense = entries.filter(e => e.accountId === accId && e.type === "expense").reduce((a, b) => a + (+b.amount || 0), 0);
    return base + entIncome - entExpense;
  };

  const totalCash = accounts.filter(a => a.type === "cash").reduce((a, b) => a + accBalance(b.id), 0);
  const totalBank = accounts.filter(a => a.type === "bank").reduce((a, b) => a + accBalance(b.id), 0);
  const totalOther = accounts.filter(a => a.type === "other").reduce((a, b) => a + accBalance(b.id), 0);

  const todayEntries = entries.filter(e => e.date === today());
  const todayIncome = todayEntries.filter(e => e.type === "income").reduce((a, b) => a + (+b.amount || 0), 0);
  const todayExpense = todayEntries.filter(e => e.type === "expense").reduce((a, b) => a + (+b.amount || 0), 0);

  const incomeCategories = ["Sales", "Other Income", "Loan Received", "Investment", "Refund Received", "Other"];
  const expenseCategories = ["Purchases", "Utilities", "Rent", "Salaries", "Transport", "Maintenance", "Tax", "Bank Charges", "Stationery", "Marketing", "Other"];

  const saveEntry = async () => {
    if (!form.accountId) { alert("Select an account"); return; }
    if (!form.amount || +form.amount <= 0) { alert("Enter a valid amount"); return; }
    if (!form.type) { alert("Select Income or Expense"); return; }
    const entry = {
      id: "ENT" + uid(),
      date: form.date || today(),
      accountId: form.accountId,
      type: form.type,
      category: form.category || "Other",
      amount: +form.amount,
      description: form.description || "",
      ref: form.ref || "",
    };
    const newDb = { ...db, accountEntries: [...entries, entry] };
    await saveDB(newDb); setDb(newDb); setModal(null); setForm({});
  };

  const saveAccount = async () => {
    if (!form.name?.trim()) { alert("Account name required"); return; }
    if (!form.type) { alert("Select account type"); return; }
    const acc = {
      id: "ACC" + uid(),
      name: form.name.trim(),
      type: form.type,
      balance: +form.balance || 0,
      description: form.description || "",
    };
    const newDb = { ...db, accounts: [...accounts, acc] };
    await saveDB(newDb); setDb(newDb); setModal(null); setForm({});
  };

  const deleteEntry = async (id) => {
    if (!confirm("Delete this entry?")) return;
    const newDb = { ...db, accountEntries: entries.filter(e => e.id !== id) };
    await saveDB(newDb); setDb(newDb);
  };

  const filteredEntries = filterAcc ? entries.filter(e => e.accountId === filterAcc) : entries;

  const SummaryCard = ({ label, value, sub, color, icon }) => (
    <div style={{ background: "#fff", borderRadius: 12, padding: 16, flex: 1, minWidth: 130, boxShadow: "0 1px 4px rgba(0,0,0,.07)", borderLeft: `4px solid ${color}` }}>
      <div style={{ fontSize: 22, marginBottom: 4 }}>{icon}</div>
      <div style={{ fontSize: 11, color: "#6b7280", fontWeight: 600 }}>{label}</div>
      <div style={{ fontSize: 18, fontWeight: 800, color, marginTop: 2 }}>{fmt(value)}</div>
      {sub && <div style={{ fontSize: 10, color: "#9ca3af", marginTop: 2 }}>{sub}</div>}
    </div>
  );

  return (
    <div>
      {/* Action buttons */}
      <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
        <Btn color="success" onClick={() => { setForm({ type: "income", date: today() }); setModal("entry"); }}>+ Income</Btn>
        <Btn color="danger" onClick={() => { setForm({ type: "expense", date: today() }); setModal("entry"); }}>− Expense</Btn>
        <Btn color="primary" onClick={() => { setForm({ type: "cash", balance: 0 }); setModal("account"); }}>+ New Account</Btn>
      </div>

      {/* Tab nav */}
      <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap" }}>
        {[{ k: "overview", l: "Overview" }, { k: "cash", l: "💵 Cash" }, { k: "bank", l: "🏦 Bank" }, { k: "income", l: "📈 Income" }, { k: "expense", l: "📉 Expenses" }, { k: "ledger", l: "📒 Ledger" }].map(t => (
          <button key={t.k} onClick={() => setTab(t.k)}
            style={{ padding: "6px 14px", borderRadius: 20, border: "none", cursor: "pointer", fontWeight: 600, fontSize: 12,
              background: tab === t.k ? "#1d4ed8" : "#f3f4f6", color: tab === t.k ? "#fff" : "#374151" }}>

      </div>

      {/* Overview */}
      {tab === "overview" && (<>
        <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
          <SummaryCard label="Cash on Hand" value={totalCash} color="#059669" icon="💵" sub={`${accounts.filter(a => a.type === "cash").length} account(s)`} />
          <SummaryCard label="Bank Accounts" value={totalBank} color="#1d4ed8" icon="🏦" sub={`${accounts.filter(a => a.type === "bank").length} account(s)`} />
          <SummaryCard label="Other Accounts" value={totalOther} color="#7c3aed" icon="💼" sub={`${accounts.filter(a => a.type === "other").length} account(s)`} />

        <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>

          <SummaryCard label="Today's Expenses" value={todayExpense} color="#dc2626" icon="📉" />

        </div>
      )}

      {/* Bank tab */}
      {tab === "bank" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {accounts.filter(a => a.type === "bank").map(acc => (
            <Card key={acc.id} style={{ borderLeft: "4px solid #1d4ed8" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <div style={{ fontWeight: 700, fontSize: 15 }}>🏦 {acc.name}</div>
                <div style={{ fontSize: 20, fontWeight: 800, color: "#1d4ed8" }}>{fmt(accBalance(acc.id))}</div>
              </div>
              {acc.description && <div style={{ fontSize: 12, color: "#6b7280", marginBottom: 8 }}>{acc.description}</div>}
              <Table cols={[
                { key: "date", label: "Date" },
                { key: "type", label: "Type", render: r => <Badge color={r.type === "income" ? "green" : "red"}>{r.type === "income" ? "↑ In" : "↓ Out"}</Badge> },
                { key: "category", label: "Category" },
                { key: "description", label: "Description" },
                { key: "ref", label: "Ref" },
                { key: "amount", label: "Amount", render: r => <span style={{ fontWeight: 700, color: r.type === "income" ? "#059669" : "#dc2626" }}>{r.type === "income" ? "+" : "-"}{fmt(r.amount)}</span> },
              ]} rows={entries.filter(e => e.accountId === acc.id).sort((a, b) => b.date < a.date ? -1 : 1)}
                onAction={r => <Btn size="sm" color="danger" onClick={() => deleteEntry(r.id)}>🗑️</Btn>} />
            </Card>
          ))}
          {accounts.filter(a => a.type === "bank").length === 0 && <Card><p style={{ textAlign: "center", color: "#9ca3af" }}>No bank accounts</p></Card>}
        </div>
      )}

      {/* Income tab */}
      {tab === "income" && (<>
        <div style={{ display: "flex", gap: 10, marginBottom: 12, flexWrap: "wrap" }}>
          <div style={{ background: "#d1fae5", borderRadius: 10, padding: "10px 16px", flex: 1, minWidth: 120 }}>
            <div style={{ fontSize: 11, color: "#065f46" }}>Total Income</div>
            <div style={{ fontSize: 18, fontWeight: 800, color: "#059669" }}>{fmt(entries.filter(e => e.type === "income").reduce((a, b) => a + (+b.amount || 0), 0))}</div>
          </div>
          <div style={{ background: "#dbeafe", borderRadius: 10, padding: "10px 16px", flex: 1, minWidth: 120 }}>
            <div style={{ fontSize: 11, color: "#1e40af" }}>Today</div>
            <div style={{ fontSize: 18, fontWeight: 800, color: "#1d4ed8" }}>{fmt(todayIncome)}</div>
          </div>
        </div>
        <Table cols={[
          { key: "date", label: "Date" },
          { key: "accountId", label: "Account", render: r => accounts.find(a => a.id === r.accountId)?.name || r.accountId },
          { key: "category", label: "Category", render: r => <Badge color="green">{r.category}</Badge> },
          { key: "description", label: "Description" },
          { key: "ref", label: "Ref" },
          { key: "amount", label: "Amount", render: r => <span style={{ fontWeight: 700, color: "#059669" }}>+{fmt(r.amount)}</span> },
        ]} rows={entries.filter(e => e.type === "income").sort((a, b) => b.date < a.date ? -1 : 1)}
          onAction={r => <Btn size="sm" color="danger" onClick={() => deleteEntry(r.id)}>🗑️</Btn>} />
      </>)}

      {/* Expense tab */}
      {tab === "expense" && (<>
        <div style={{ display: "flex", gap: 10, marginBottom: 12, flexWrap: "wrap" }}>
          <div style={{ background: "#fee2e2", borderRadius: 10, padding: "10px 16px", flex: 1, minWidth: 120 }}>
            <div style={{ fontSize: 11, color: "#991b1b" }}>Total Expenses</div>
            <div style={{ fontSize: 18, fontWeight: 800, color: "#dc2626" }}>{fmt(entries.filter(e => e.type === "expense").reduce((a, b) => a + (+b.amount || 0), 0))}</div>
          </div>
          <div style={{ background: "#fef3c7", borderRadius: 10, padding: "10px 16px", flex: 1, minWidth: 120 }}>
            <div style={{ fontSize: 11, color: "#92400e" }}>Today</div>
            <div style={{ fontSize: 18, fontWeight: 800, color: "#d97706" }}>{fmt(todayExpense)}</div>
          </div>
        </div>
        <Table cols={[
          { key: "date", label: "Date" },
          { key: "accountId", label: "Account", render: r => accounts.find(a => a.id === r.accountId)?.name || r.accountId },
          { key: "category", label: "Category", render: r => <Badge color="red">{r.category}</Badge> },
          { key: "description", label: "Description" },
          { key: "ref", label: "Ref" },
          { key: "amount", label: "Amount", render: r => <span style={{ fontWeight: 700, color: "#dc2626" }}>-{fmt(r.amount)}</span> },
        ]} rows={entries.filter(e => e.type === "expense").sort((a, b) => b.date < a.date ? -1 : 1)}
          onAction={r => <Btn size="sm" color="danger" onClick={() => deleteEntry(r.id)}>🗑️</Btn>} />
      </>)}

      {/* Ledger tab — all entries */}
      {tab === "ledger" && (<>
        <div style={{ marginBottom: 10 }}>
          <select value={filterAcc} onChange={e => setFilterAcc(e.target.value)}
            style={{ width: "100%", padding: "8px 12px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 13 }}>
            <option value="">All Accounts</option>
            {accounts.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
          </select>
        </div>
        <Table cols={[
          { key: "date", label: "Date" },
          { key: "accountId", label: "Account", render: r => <span style={{ fontSize: 11 }}>{accounts.find(a => a.id === r.accountId)?.name || r.accountId}</span> },
          { key: "type", label: "", render: r => <Badge color={r.type === "income" ? "green" : "red"}>{r.type === "income" ? "↑" : "↓"}</Badge> },
          { key: "category", label: "Category" },
          { key: "description", label: "Description" },
          { key: "amount", label: "Amount", render: r => <span style={{ fontWeight: 700, color: r.type === "income" ? "#059669" : "#dc2626" }}>{r.type === "income" ? "+" : "-"}{fmt(r.amount)}</span> },
        ]} rows={filteredEntries.sort((a, b) => b.date < a.date ? -1 : 1)}
          onAction={r => <Btn size="sm" color="danger" onClick={() => deleteEntry(r.id)}>🗑️</Btn>} />
      </>)}

      {/* ── New Entry Modal ── */}
      {modal === "entry" && (
        <Modal title={form.type === "income" ? "📈 Add Income" : "📉 Add Expense"} onClose={() => { setModal(null); setForm({}); }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <Input label="Date *" type="date" value={form.date || today()} onChange={e => setForm({ ...form, date: e.target.value })} />
            <div>
              <label style={{ fontSize: 12, color: "#6b7280", fontWeight: 600, display: "block", marginBottom: 4 }}>Type *</label>
              <div style={{ display: "flex", gap: 8 }}>
                {[{ k: "income", l: "📈 Income", c: "#059669" }, { k: "expense", l: "📉 Expense", c: "#dc2626" }].map(t => (
                  <button key={t.k} onClick={() => setForm({ ...form, type: t.k, category: "" })}
                    style={{ flex: 1, padding: "8px", borderRadius: 8, border: `2px solid ${form.type === t.k ? t.c : "#e5e7eb"}`, background: form.type === t.k ? t.c : "#f9fafb", color: form.type === t.k ? "#fff" : "#374151", cursor: "pointer", fontWeight: 700, fontSize: 12 }}>
                    {t.l}
                  </button>
                ))}
              </div>
            </div>
          </div>

          <Select label="Account *" value={form.accountId || ""} onChange={e => setForm({ ...form, accountId: e.target.value })}>
            <option value="">Select account...</option>
            {accounts.map(a => <option key={a.id} value={a.id}>{a.type === "cash" ? "💵" : a.type === "bank" ? "🏦" : "💼"} {a.name} — {fmt(accBalance(a.id))}</option>)}
          </Select>

          <Select label="Category *" value={form.category || ""} onChange={e => setForm({ ...form, category: e.target.value })}>
            <option value="">Select category...</option>
            {(form.type === "income" ? incomeCategories : expenseCategories).map(c => <option key={c}>{c}</option>)}
          </Select>

          <Input label="Amount (Rs.) *" type="number" value={form.amount || ""} onChange={e => setForm({ ...form, amount: e.target.value })} placeholder="0.00" />
          <Input label="Description" value={form.description || ""} onChange={e => setForm({ ...form, description: e.target.value })} placeholder="Brief note..." />
          <Input label="Reference No." value={form.ref || ""} onChange={e => setForm({ ...form, ref: e.target.value })} placeholder="Bill/voucher no. (optional)" />

          <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 8 }}>
            <Btn color="ghost" onClick={() => { setModal(null); setForm({}); }}>Cancel</Btn>
            <Btn color={form.type === "income" ? "success" : "danger"} onClick={saveEntry}>
              {form.type === "income" ? "Save Income" : "Save Expense"}
            </Btn>
          </div>
        </Modal>
      )}

      {/* ── New Account Modal ── */}
      {modal === "account" && (
        <Modal title="💼 Add New Account" onClose={() => { setModal(null); setForm({}); }}>
          <Input label="Account Name *" value={form.name || ""} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="e.g. Sampath Bank, Petty Cash" />
          <div>
            <label style={{ fontSize: 12, color: "#6b7280", fontWeight: 600, display: "block", marginBottom: 4 }}>Account Type *</label>
            <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
              {[{ k: "cash", l: "💵 Cash", c: "#059669" }, { k: "bank", l: "🏦 Bank", c: "#1d4ed8" }, { k: "other", l: "💼 Other", c: "#7c3aed" }].map(t => (
                <button key={t.k} onClick={() => setForm({ ...form, type: t.k })}
                  style={{ flex: 1, padding: "10px 6px", borderRadius: 8, border: `2px solid ${form.type === t.k ? t.c : "#e5e7eb"}`, background: form.type === t.k ? t.c : "#f9fafb", color: form.type === t.k ? "#fff" : "#374151", cursor: "pointer", fontWeight: 700, fontSize: 13 }}>
                  {t.l}
                </button>
              ))}
            </div>
          </div>
          <Input label="Opening Balance (Rs.)" type="number" value={form.balance || ""} onChange={e => setForm({ ...form, balance: e.target.value })} placeholder="0.00" />
          <Input label="Description" value={form.description || ""} onChange={e => setForm({ ...form, description: e.target.value })} placeholder="Account number, branch, etc." />
          <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 8 }}>
            <Btn color="ghost" onClick={() => { setModal(null); setForm({}); }}>Cancel</Btn>
            <Btn color="primary" onClick={saveAccount}>Save Account</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
};

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [db, setDb] = useState(null);
  const [mode, setMode] = useState(null); // null = landing, "staff", "customer"
  const [staffPage, setStaffPage] = useState("registration");
  const [cart, setCart] = useState([]);
  const [custId, setCustId] = useState(null);
  const [loading, setLoading] = useState(true);
  const [newOrderAlert, setNewOrderAlert] = useState(0);
  const lastOrderRef = React.useRef(0);

  // Staff: poll for new customer orders every 8s
  useEffect(() => {
    if (mode !== "staff") return;
    const check = async () => {
      const fresh = await loadDB();
      if (!fresh) return;
      const pending = (fresh.orders || []).filter(o => o.status === "pending").length;
      if (lastOrderRef.current > 0 && pending > lastOrderRef.current) {
        // New order came in — play alert sound
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          [880, 660, 880, 660].forEach((freq, i) => {
            const osc = ctx.createOscillator(); const g = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.frequency.value = freq;
            const t = ctx.currentTime + i * 0.2;
            g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
            osc.start(t); osc.stop(t + 0.4);
          });
        } catch(e) {}
        setNewOrderAlert(pending);
        setDb(fresh);
      }
      lastOrderRef.current = pending;
    };
    const iv = setInterval(check, 8000);
    return () => clearInterval(iv);
  }, [mode]);

  useEffect(() => {
    loadDB().then(d => { setDb(d); setLoading(false); });
  }, []);

  if (loading) return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", flexDirection: "column", gap: 12 }}>
      <div style={{ fontSize: 48 }}>💊</div>
      <div style={{ fontWeight: 700, color: "#1d4ed8", fontSize: 20 }}>Sesanda Pharmacy</div>
      <div style={{ color: "#6b7280" }}>Loading...</div>
    </div>
  );

  // Landing
  if (!mode) return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 50%, #059669 100%)", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ textAlign: "center", color: "#fff", padding: 32 }}>
        <div style={{ fontSize: 64, marginBottom: 8 }}>🏥</div>
        <h1 style={{ fontSize: 28, fontWeight: 800, margin: "0 0 4px" }}>Sesanda Pharmacy</h1>
        <p style={{ opacity: 0.85, marginBottom: 40, fontSize: 15 }}>Colombo • Kandy • Galle</p>
        <div style={{ display: "flex", flexDirection: "column", gap: 12, maxWidth: 280, margin: "0 auto" }}>
          <button onClick={() => setMode("staff")} style={{
            padding: "14px 24px", borderRadius: 12, border: "none", cursor: "pointer",
            background: "#fff", color: "#1d4ed8", fontWeight: 700, fontSize: 16,
            boxShadow: "0 4px 16px rgba(0,0,0,.2)",
          }}>👨‍⚕️ Staff / Admin Portal</button>
          <button onClick={() => setMode("customer")} style={{
            padding: "14px 24px", borderRadius: 12, border: "2px solid rgba(255,255,255,.5)", cursor: "pointer",
            background: "rgba(255,255,255,.15)", color: "#fff", fontWeight: 700, fontSize: 16,
            backdropFilter: "blur(8px)",
          }}>🛒 Customer Portal</button>
        </div>
        <p style={{ marginTop: 32, fontSize: 12, opacity: 0.6 }}>Single database • Real-time stock</p>
      </div>
    </div>
  );

  // Staff Mode
  if (mode === "staff") {
    const navItems = [
      { key: "registration", label: "Register", icon: "📝" },
      { key: "transactions", label: "Transactions", icon: "📦" },
      { key: "reports", label: "Reports", icon: "📊" },
      { key: "accounting", label: "Accounting", icon: "💰" },
    ];
    return (
      <div style={{ minHeight: "100vh", background: "#f8fafc", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" }}>
        {/* Header */}
        <div style={{ background: "linear-gradient(90deg, #1e3a8a, #1d4ed8)", color: "#fff", padding: "12px 16px", display: "flex", alignItems: "center", gap: 12, position: "sticky", top: 0, zIndex: 100 }}>
          <button onClick={() => setMode(null)} style={{ background: "none", border: "none", color: "#fff", cursor: "pointer", fontSize: 18 }}>←</button>
          <span style={{ fontSize: 20 }}>🏥</span>
          <div>
            <div style={{ fontWeight: 700 }}>Sesanda Pharmacy</div>
            <div style={{ fontSize: 11, opacity: 0.8 }}>Staff Portal</div>
          </div>
          <div style={{ marginLeft: "auto", display: "flex", gap: 8, alignItems: "center" }}>
            {newOrderAlert > 0 && (
              <button onClick={() => { setNewOrderAlert(0); setStaffPage("transactions"); }}
                style={{ background: "#dc2626", color: "#fff", border: "none", borderRadius: 20, padding: "4px 12px", cursor: "pointer", fontWeight: 700, fontSize: 12, animation: "pulse 1s infinite" }}>
                🔔 {newOrderAlert} New Order{newOrderAlert > 1 ? "s" : ""}!
              </button>
            )}
            {db.items.filter(it => db.stock.filter(s => s.itemId === it.id).reduce((a, b) => a + b.qty, 0) < it.reorderLevel).length > 0 && (
              <Badge color="red">⚠️ Low Stock</Badge>
            )}
          </div>
        </div>

        {/* Dashboard summary */}
        {staffPage === "registration" || staffPage === "transactions" || staffPage === "reports" ? null : null}

        {/* Nav */}
        <div style={{ background: "#fff", borderBottom: "1px solid #e5e7eb", display: "flex", gap: 0 }}>
          {navItems.map(n => (
            <button key={n.key} onClick={() => setStaffPage(n.key)} style={{
              flex: 1, padding: "10px 4px", border: "none", cursor: "pointer", fontWeight: 600, fontSize: 11,
              background: staffPage === n.key ? "#eff6ff" : "#fff",
              color: staffPage === n.key ? "#1d4ed8" : "#374151",
              borderBottom: staffPage === n.key ? "2px solid #1d4ed8" : "2px solid transparent",
            }}>
              <div style={{ fontSize: 18, marginBottom: 2 }}>{n.icon}</div>
              {n.label}
            </button>
          ))}
        </div>

        {/* Quick stats */}
        <div style={{ padding: "12px 16px", background: "#fff", borderBottom: "1px solid #f3f4f6" }}>
          <div style={{ display: "flex", gap: 10, overflowX: "auto", paddingBottom: 4 }}>
            {[
              { label: "Today's Sales", value: fmt(db.invoices.filter(i => i.date === today()).reduce((a, b) => a + b.total, 0)), color: "#059669" },
              { label: "Pending Orders", value: (db.orders || []).filter(o => o.status === "pending").length, color: "#d97706" },
              { label: "Low Stock Items", value: db.items.filter(it => db.stock.filter(s => s.itemId === it.id).reduce((a, b) => a + b.qty, 0) < it.reorderLevel).length, color: "#dc2626" },
              { label: "Expiring (3m)", value: db.stock.filter(s => months(s.expiry) < 3 && s.qty > 0).length, color: "#7c3aed" },
              { label: "Cash on Hand", value: fmt((db.accounts || []).filter(a => a.type === "cash").reduce((a, acc) => {
                  const base = acc.balance || 0;
                  const inc = (db.accountEntries || []).filter(e => e.accountId === acc.id && e.type === "income").reduce((x, y) => x + (+y.amount || 0), 0);
                  const exp = (db.accountEntries || []).filter(e => e.accountId === acc.id && e.type === "expense").reduce((x, y) => x + (+y.amount || 0), 0);
                  return a + base + inc - exp;
                }, 0)), color: "#059669" },
            ].map((s, i) => (
              <div key={i} style={{ flex: "0 0 auto", background: "#f8fafc", borderRadius: 8, padding: "8px 14px", textAlign: "center", minWidth: 100 }}>
                <div style={{ fontSize: 16, fontWeight: 700, color: s.color }}>{s.value}</div>
                <div style={{ fontSize: 10, color: "#6b7280", marginTop: 2 }}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Content */}
        <div style={{ padding: 16, maxWidth: 1200, margin: "0 auto" }}>
          {staffPage === "registration" && <RegistrationPage db={db} setDb={setDb} />}
          {staffPage === "transactions" && <TransactionsPage db={db} setDb={setDb} />}
          {staffPage === "reports" && <ReportsPage db={db} />}
          {staffPage === "accounting" && <AccountingPage db={db} setDb={setDb} />}
        </div>
      </div>
    );
  }

  // Customer Mode
  return (
    <div style={{ minHeight: "100vh", background: "#f0fdf4", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" }}>
      {/* Header */}
      <div style={{ background: "linear-gradient(90deg, #065f46, #059669)", color: "#fff", padding: "12px 16px", display: "flex", alignItems: "center", gap: 12, position: "sticky", top: 0, zIndex: 100 }}>
        <button onClick={() => setMode(null)} style={{ background: "none", border: "none", color: "#fff", cursor: "pointer", fontSize: 18 }}>←</button>
        <span style={{ fontSize: 20 }}>🏥</span>
        <div>
          <div style={{ fontWeight: 700 }}>Sesanda Pharmacy</div>
          <div style={{ fontSize: 11, opacity: 0.8 }}>Customer Portal</div>
        </div>
        <div style={{ marginLeft: "auto" }}>
          {cart.length > 0 && <Badge color="green">🛒 {cart.length} items</Badge>}
        </div>
      </div>

      <div style={{ padding: 16, maxWidth: 900, margin: "0 auto" }}>
        <CustomerOrderPage db={db} setDb={setDb} cart={cart} setCart={setCart} custId={custId} />
      </div>
    </div>
  );
}
    try {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(React.createElement(App));
      if(typeof setProgress !== 'undefined') setProgress(100, 'Ready!');
    } catch(e) {
      console.error('App render error:', e);
      document.getElementById('root').innerHTML = '<div style="padding:40px;text-align:center;color:red"><h2>⚠️ App Error</h2><p>' + e.message + '</p><button onclick="location.reload()">Reload</button></div>';
    }
  </script>
  <div style="position:fixed;bottom:20px;right:16px;z-index:9999;">
    <div id="bk-panel" style="display:none;background:#fff;border-radius:14px;padding:16px;box-shadow:0 4px 24px rgba(0,0,0,.2);border:1px solid #e5e7eb;min-width:220px;margin-bottom:10px;">
      <div style="font-weight:800;font-size:14px;color:#1e3a8a;margin-bottom:12px;">💾 Data Management</div>
      <button onclick="doExport()" style="width:100%;padding:10px;background:#059669;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:13px;margin-bottom:8px;">📥 Export Backup</button>
      <label style="display:block;width:100%;text-align:center;padding:10px;background:#1d4ed8;color:#fff;border-radius:8px;cursor:pointer;font-weight:700;font-size:13px;margin-bottom:8px;">📤 Import Backup<input type="file" accept=".json" onchange="doImport(event)" style="display:none;" /></label>
      <button onclick="doClear()" style="width:100%;padding:8px;background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;border-radius:8px;cursor:pointer;font-weight:700;font-size:12px;">🗑️ Clear All Data</button>
    </div>
    <button onclick="document.getElementById('bk-panel').style.display=document.getElementById('bk-panel').style.display==='none'?'block':'none'" style="width:52px;height:52px;background:linear-gradient(135deg,#1e3a8a,#1d4ed8);color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:24px;box-shadow:0 3px 12px rgba(0,0,0,.25);">💾</button>
  </div>
  <script>
    function doExport(){const d=localStorage.getItem('sp_sesanda_db');if(!d){alert('No data yet!');return;}const a=document.createElement('a');a.href='data:application/json;charset=utf-8,'+encodeURIComponent(d);a.download='sesanda-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();alert('✅ Backup downloaded!');}
    function doImport(e){const f=e.target.files[0];if(!f)return;if(!confirm('Replace ALL data?'))return;const r=new FileReader();r.onload=function(ev){try{JSON.parse(ev.target.result);localStorage.setItem('sp_sesanda_db',ev.target.result);alert('✅ Restored!');location.reload();}catch{alert('❌ Invalid file!');}};r.readAsText(f);}
    function doClear(){if(!confirm('DELETE ALL DATA?'))return;if(!confirm('Sure?'))return;localStorage.removeItem('sp_sesanda_db');location.reload();}
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(r => console.log('SW registered:', r.scope))
          .catch(e => console.log('SW error:', e));
      });
    }
  </script>
</body>
