}

// ─── AI Chat for Customer ─────────────────────────────────────────────────────
const AIAssistant = ({ db, onAddToCart }) => {
  const [msgs, setMsgs] = useState([{ role: "assistant", text: "Hello! I'm your Sesanda Pharmacy assistant. Describe your symptoms or medicines you need, and I'll help you find the right products. You can also upload a prescription photo!" }]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [file, setFile] = useState(null);
  const [fileData, setFileData] = useState(null);

  const sendMsg = async () => {
    if (!input.trim() && !fileData) return;
    const userMsg = { role: "user", text: input || "(Prescription/Image uploaded)", image: fileData };
    setMsgs(prev => [...prev, userMsg]);
    setInput(""); setFile(null); setFileData(null);
    setLoading(true);

    const itemList = db.items.map(it => {
      const stock = db.stock.filter(s => s.itemId === it.id).reduce((a, b) => a + b.qty, 0);
      return `${it.brandName} ${it.strength} (${it.genericName}) — Price: Rs.${it.sellingPrice}/${it.packSize} — Stock: ${stock} packs available`;
    }).join("\n");

    const content = fileData
      ? [{ type: "image", source: { type: "base64", media_type: "image/jpeg", data: fileData } },
         { type: "text", text: input || "This is a prescription. Please identify medicines and match them with our inventory." }]
      : input;

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6", max_tokens: 1000,
          system: `You are a helpful pharmacy assistant for Sesanda Pharmacy. 
Our current inventory:
${itemList}

Help customers find medicines, answer questions about availability, suggest alternatives.
Format your response clearly. If they ask about specific medicines, mention price and availability.
Keep responses concise and helpful. Always mention if something is out of stock.`,
          messages: [{ role: "user", content }],
        }),
      });
      const data = await res.json();
      const text = data.content?.map(b => b.text || "").join("") || "Sorry, I couldn't process that.";
      setMsgs(prev => [...prev, { role: "assistant", text }]);
    } catch {
      setMsgs(prev => [...prev, { role: "assistant", text: "Connection error. Please try again." }]);
    }
    setLoading(false);
  };

  const handleFile = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    setFile(f);
    const reader = new FileReader();
    reader.onload = () => setFileData(reader.result.split(",")[1]);
    reader.readAsDataURL(f);
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "65vh" }}>
      <div style={{ flex: 1, overflowY: "auto", padding: "0 4px", display: "flex", flexDirection: "column", gap: 10 }}>
        {msgs.map((m, i) => (
          <div key={i} style={{ display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start" }}>
            <div style={{
              maxWidth: "80%", padding: "10px 14px", borderRadius: 12,
              background: m.role === "user" ? "#1d4ed8" : "#f3f4f6",
              color: m.role === "user" ? "#fff" : "#111",
              fontSize: 14, lineHeight: 1.5, whiteSpace: "pre-wrap",
            }}>
              {m.image && <div style={{ marginBottom: 6, fontSize: 12, opacity: 0.7 }}>📷 Image attached</div>}
              {m.text}
            </div>
          </div>
        ))}
        {loading && <div style={{ textAlign: "center", color: "#9ca3af", fontSize: 13 }}>⏳ Thinking...</div>}
      </div>
      <div style={{ marginTop: 12, borderTop: "1px solid #e5e7eb", paddingTop: 12 }}>
        {file && <div style={{ background: "#dbeafe", padding: "4px 10px", borderRadius: 8, fontSize: 12, marginBottom: 8 }}>📷 {file.name}</div>}
        <div style={{ display: "flex", gap: 8 }}>
          <label style={{ cursor: "pointer", padding: "8px 12px", background: "#f3f4f6", borderRadius: 8, fontSize: 18 }}>
            📷<input type="file" accept="image/*" onChange={handleFile} style={{ display: "none" }} />
          </label>
          <input value={input} onChange={e => setInput(e.target.value)}
            onKeyDown={e => e.key === "Enter" && sendMsg()}
            placeholder="Type your query or describe symptoms..."
            style={{ flex: 1, padding: "8px 12px", border: "1px solid #e5e7eb", borderRadius: 8, fontSize: 14 }} />
          <Btn onClick={sendMsg} disabled={loading}>Send</Btn>
        </div>
      </div>
    </div>
  );
};

// Registration Page
const RegistrationPage = ({ db, setDb }) => {
  const [tab, setTab] = useState("item");
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({});
  const [search, setSearch] = useState("");

  const tabs = [
    { key: "item", label: "Items", icon: "item" },
    { key: "customer", label: "Customers", icon: "customer" },
    { key: "supplier", label: "Suppliers", icon: "supplier" },
  ];

  // Auto-generate next 5-digit numeric item code
  const nextItemCode = () => {
    const used = db.items.map(i => parseInt(i.itemCode, 10)).filter(n => !isNaN(n));
    const max = used.length > 0 ? Math.max(...used) : 0;
    return String(max + 1).padStart(5, "0");
  };

  const save = async () => {
    const newDb = { ...db };
    if (tab === "item") {
      // Validate required
      if (!form.genericName?.trim()) { alert("Generic Name is required"); return; }
      if (!form.brandName?.trim())   { alert("Brand Name is required"); return; }
      if (!form.strength?.trim())    { alert("Strength is required"); return; }
      // Duplicate check: same brand + strength already exists
      const duplicate = db.items.find(i =>
        i.id !== form.id &&
        i.brandName?.toLowerCase() === form.brandName.toLowerCase().trim() &&
        i.strength?.toLowerCase()  === form.strength.toLowerCase().trim()
      );
      if (duplicate) {
        alert(`⚠️ Item already exists!\n\nCode: ${duplicate.itemCode}\n${duplicate.brandName} ${duplicate.strength}\n\nEach Brand + Strength combination must be unique.`);
        return;
      }
      const packSize = form.packSizeQty && form.packSizeUnit ? `${form.packSizeQty} ${form.packSizeUnit}` : (form.packSize || "");
      // Item code: numeric 5-digit
      const rawCode = form.itemCode?.replace(/\D/g, "");
      const itemCode = rawCode ? String(parseInt(rawCode, 10)).padStart(5, "0") : nextItemCode();
      // Check item code uniqueness
      const codeDup = db.items.find(i => i.id !== form.id && i.itemCode === itemCode);
      if (codeDup) {
        alert(`⚠️ Item Code ${itemCode} is already used by:\n${codeDup.brandName} ${codeDup.strength}\n\nLeave blank for auto-assign.`);
        return;
      }
      const item = {
        id: form.id || "I" + uid(),
        itemCode,
        genericName:  form.genericName.trim(),
        brandName:    form.brandName.trim(),
        strength:     form.strength.trim(),
        dosageForm:   form.dosageForm || "",
        packSize,
        packSizeQty:  form.packSizeQty || "",
        packSizeUnit: form.packSizeUnit || "",
        costPrice:    +form.costPrice || 0,
        sellingPrice: +form.sellingPrice || 0,
        reorderLevel: +form.reorderLevel || 0,
        supplierId:   form.supplierId || "",
      };
      if (form.id) { newDb.items = db.items.map(i => i.id === form.id ? item : i); }
      else { newDb.items = [...db.items, item]; }
    } else if (tab === "customer") {
      const cust = { id: form.id || "C" + uid(), ...form, loyaltyPoints: +form.loyaltyPoints || 0 };
      if (form.id) { newDb.customers = db.customers.map(c => c.id === form.id ? cust : c); }
      else { newDb.customers = [...db.customers, cust]; }
    } else {
      const sup = { id: form.id || "S" + uid(), ...form };
      if (form.id) { newDb.suppliers = db.suppliers.map(s => s.id === form.id ? sup : s); }
      else { newDb.suppliers = [...db.suppliers, sup]; }
    }
    await saveDB(newDb); setDb(newDb); setModal(null); setForm({});
  };

  const del = async (id) => {
    if (!confirm("Delete this record?")) return;
    const newDb = { ...db };
    if (tab === "item") newDb.items = db.items.filter(i => i.id !== id);
    else if (tab === "customer") newDb.customers = db.customers.filter(c => c.id !== id);
    else newDb.suppliers = db.suppliers.filter(s => s.id !== id);
    await saveDB(newDb); setDb(newDb);
  };

  const filtered = {
    item: db.items.filter(i => {

      {tab === "customer" && (

            { key: "name", label: "Name" },
            { key: "phone", label: "Phone" },
            { key: "email", label: "Email" },

            { key: "contact", label: "Contact" },

                  <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                    <input

                    <button

                      onClick={() => setForm({ ...form, itemCode: nextItemCode() })}

                      🔄 Auto

                  </div>
                  <div style={{ fontSize: 10, color: "#6b7280", marginTop: 4 }}>

                  {form.itemCode && db.items.find(i => i.id !== form.id && i.itemCode === String(parseInt(form.itemCode, 10)).padStart(5, "0")) && (
                    <div style={{ fontSize: 11, color: "#dc2626", marginTop: 4, fontWeight: 600 }}>
                      ⚠️ Code already in use — choose another

              {/* Row 1: Generic Name + Dosage Form */}

                <div>
                  <label style={{ fontSize: 12, color: "#6b7280", fontWeight: 600, display: "block", marginBottom: 4 }}>Generic Name (Medicine) *</label>

                  <div style={{ fontSize: 10, color: "#6b7280", marginTop: 3 }}>International Non-proprietary Name</div>
                </div>
                <Select label="Dosage Form *" value={form.dosageForm || ""} onChange={e => setForm({ ...form, dosageForm: e.target.value })}>
                  <option value="">Select form...</option>
                  {["Tablet","Capsule","Syrup","Suspension","Injection","Cream","Ointment","Gel","Drops (Eye)","Drops (Ear)","Drops (Nasal)","Inhaler","Suppository","Patch","Powder","Sachet","Other"].map(c => <option key={c}>{c}</option>)}
                </Select>
              </div>

              {/* Row 2: Brand Name + Strength — the KEY unique combination */}
              <div style={{ background: "#ecfdf5", border: "2px solid #6ee7b7", borderRadius: 10, padding: 12, marginBottom: 10 }}>

                  🏷️ BRAND NAME + STRENGTH = Unique Item
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  <div>
                    <label style={{ fontSize: 12, color: "#065f46", fontWeight: 700, display: "block", marginBottom: 4 }}>Brand Name *</label>
                    <input value={form.brandName || ""} onChange={e => setForm({ ...form, brandName: e.target.value })}
                      placeholder="e.g. Atorva, Lipitor, Glucophage"
                      style={{ width: "100%", padding: "8px 12px", border: "2px solid #6ee7b7", borderRadius: 8, fontSize: 14, boxSizing: "border-box", fontWeight: 600 }} />
                    <div style={{ fontSize: 10, color: "#059669", marginTop: 3 }}>Manufacturer's trade name</div>
                  </div>
                  <div>
                    <label style={{ fontSize: 12, color: "#065f46", fontWeight: 700, display: "block", marginBottom: 4 }}>Strength *</label>
                    <input value={form.strength || ""} onChange={e => setForm({ ...form, strength: e.target.value })}
                      placeholder="e.g. 5mg, 10mg, 20mg, 500mg"
                      style={{ width: "100%", padding: "8px 12px", border: "2px solid #6ee7b7", borderRadius: 8, fontSize: 14, boxSizing: "border-box", fontWeight: 600 }} />
                    <div style={{ fontSize: 10, color: "#059669", marginTop: 3 }}>Each strength = separate item code</div>
                  </div>
                </div>

                {/* Live duplicate check */}
                {form.brandName && form.strength && (() => {
                  const dup = db.items.find(i =>
                    i.id !== form.id &&
                    i.brandName?.toLowerCase() === form.brandName.toLowerCase().trim() &&
                    i.strength?.toLowerCase() === form.strength.toLowerCase().trim()
                  );
                  if (dup) return (
                    <div style={{ marginTop: 8, padding: "6px 10px", background: "#fee2e2", borderRadius: 8, fontSize: 12, color: "#991b1b", fontWeight: 600 }}>
                      ⚠️ Already registered: <strong>{dup.brandName} {dup.strength}</strong> → Code <span style={{ fontFamily: "monospace" }}>{dup.itemCode}</span>
                    </div>
                  );
                  return (
                    <div style={{ marginTop: 8, padding: "6px 10px", background: "#d1fae5", borderRadius: 8, fontSize: 12, color: "#065f46", fontWeight: 600 }}>
                      ✓ {form.brandName} {form.strength} — New unique item
                    </div>
                  );
                })()}
              </div>

              {/* Same generic siblings preview */}
              {form.genericName && (() => {
                const siblings = db.items.filter(i =>
                  i.id !== form.id &&
                  i.genericName?.toLowerCase() === form.genericName.toLowerCase().trim()
                );
                if (siblings.length === 0) return null;
                return (
                  <div style={{ background: "#fffbeb", border: "1px solid #fde68a", borderRadius: 8, padding: 10 }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: "#92400e", marginBottom: 6 }}>
                      📋 Other {form.genericName} items already registered:
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                      {siblings.map(s => (
                        <div key={s.id} style={{ display: "flex", gap: 8, alignItems: "center", fontSize: 12 }}>
                          <span style={{ fontFamily: "monospace", background: "#fef3c7", padding: "1px 6px", borderRadius: 4, fontWeight: 700, color: "#92400e" }}>{s.itemCode}</span>
                          <span style={{ fontWeight: 600 }}>{s.brandName}</span>
                          <span style={{ color: "#6b7280" }}>{s.strength}</span>
                          <span style={{ color: "#9ca3af" }}>— {s.dosageForm} — {s.packSize}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })()}
            </div>

            {/* Section: Pack & Pricing */}
            <div style={{ background: "#fffbeb", borderRadius: 8, padding: "10px 14px", marginBottom: 14 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: "#d97706", marginBottom: 10, letterSpacing: 1 }}>📦 PACK & PRICING</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <div>
                  <label style={{ fontSize: 12, color: "#6b7280", fontWeight: 600, display: "block", marginBottom: 4 }}>Pack Size *</label>
                  <div style={{ display: "flex", gap: 6 }}>
                    <input value={form.packSizeQty || ""} onChange={e => setForm({ ...form, packSizeQty: e.target.value })}
                      type="number" placeholder="10"
                      style={{ width: 70, padding: "8px 10px", border: "1px solid #e5e7eb", borderRadius: 8, fontSize: 14, background: "#fafafa" }} />
                    <select value={form.packSizeUnit || ""} onChange={e => setForm({ ...form, packSizeUnit: e.target.value })}
                      style={{ flex: 1, padding: "8px 10px", border: "1px solid #e5e7eb", borderRadius: 8, fontSize: 14, background: "#fafafa" }}>
                      <option value="">Unit...</option>
                      {["Tablets", "Capsules", "ml", "mg", "Sachets", "Ampoules", "Vials", "Patches", "Suppositories", "Units"].map(u => <option key={u}>{u}</option>)}
                    </select>
                  </div>
                  <div style={{ fontSize: 10, color: "#9ca3af", marginTop: 3 }}>
                    {form.packSizeQty && form.packSizeUnit ? <Badge color="yellow">Pack: {form.packSizeQty} {form.packSizeUnit}</Badge> : "e.g. 10 Tablets, 100ml, 5 Ampoules"}
                  </div>
                </div>
                <Input label="Reorder Level (Packs)" type="number" value={form.reorderLevel || ""} onChange={e => setForm({ ...form, reorderLevel: e.target.value })} placeholder="e.g. 50" />
                <Input label="Cost Price (Rs.) *" type="number" value={form.costPrice || ""} onChange={e => setForm({ ...form, costPrice: e.target.value })} />
                <div>
                  <Input label="Selling Price (Rs.) *" type="number" value={form.sellingPrice || ""} onChange={e => setForm({ ...form, sellingPrice: e.target.value })} />
                  {form.costPrice && form.sellingPrice && +form.costPrice > 0 && (
                    <div style={{ fontSize: 11, color: "#059669", marginTop: -8 }}>
                      Margin: {(((+form.sellingPrice - +form.costPrice) / +form.costPrice) * 100).toFixed(1)}% — Profit: {fmt(+form.sellingPrice - +form.costPrice)}/pack
                    </div>
                  )}
                </div>
              </div>
            </div>

            <Select label="Default Supplier" value={form.supplierId || ""} onChange={e => setForm({ ...form, supplierId: e.target.value })}>
              <option value="">Select supplier...</option>
              {db.suppliers.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
            </Select>
          </>)}
          {tab === "customer" && (<>
            <Input label="Full Name *" value={form.name || ""} onChange={e => setForm({ ...form, name: e.target.value })} />
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Input label="Phone *" value={form.phone || ""} onChange={e => setForm({ ...form, phone: e.target.value })} />
              <Input label="Email" value={form.email || ""} onChange={e => setForm({ ...form, email: e.target.value })} />
            </div>
            <Input label="Address" value={form.address || ""} onChange={e => setForm({ ...form, address: e.target.value })} />
          </>)}
          {tab === "supplier" && (<>
            <Input label="Company Name *" value={form.name || ""} onChange={e => setForm({ ...form, name: e.target.value })} />
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Input label="Contact No." value={form.contact || ""} onChange={e => setForm({ ...form, contact: e.target.value })} />
              <Input label="Email" value={form.email || ""} onChange={e => setForm({ ...form, email: e.target.value })} />
            </div>
            <Input label="Address" value={form.address || ""} onChange={e => setForm({ ...form, address: e.target.value })} />
            <Select label="Payment Terms" value={form.paymentTerms || ""} onChange={e => setForm({ ...form, paymentTerms: e.target.value })}>
              {["15 days", "30 days", "45 days", "60 days", "Cash"].map(t => <option key={t}>{t}</option>)}
            </Select>
          </>)}
          <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 16 }}>
            <Btn color="ghost" onClick={() => { setModal(null); setForm({}); }}>Cancel</Btn>
            <Btn color="success" onClick={save}>Save</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
};

  const saveGRN = async () => {

      let time = ctx.currentTime;
      notes.forEach(freq => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = "sine";
        gain.gain.setValueAtTime(0.3, time);
        gain.gain.exponentialRampToValueAtTime(0.001, time + 0.3);

          const newDb = { ...db, suppliers: [...db.suppliers, newSup] };

        // ── Camera scan: photo → AI → match item ─────────────────────────

          setScanLoading(true);
          try {
            // Convert image to base64
            const base64 = await new Promise((res, rej) => {
              const r = new FileReader();
              r.onload = () => res(r.result.split(",")[1]);
              r.onerror = rej;
              r.readAsDataURL(file);
            });
            const mediaType = file.type || "image/jpeg";

            // Build item list for AI to match against
            const itemList = db.items.map(it =>
              `ID:${it.id} | Code:${it.itemCode} | Brand:${it.brandName} | Generic:${it.genericName} | Strength:${it.strength} | Form:${it.dosageForm} | Pack:${it.packSize}`

${itemList}

Respond ONLY with a single JSON object, no markdown, no explanation:
{"itemId":"<matched ID or empty string>","detectedName":"<brand name from photo>","detectedStrength":"<strength from photo>","confidence":"high|medium|low"}

If no match found, set itemId to empty string but still fill detectedName and detectedStrength.`,

                }]

            const clean = text.replace(/```json|```/g, "").trim();
            const result = JSON.parse(clean);

            if (result.itemId) {
              // Found a match — auto-fill the row
              const it = db.items.find(x => x.id === result.itemId);
              if (it) {
                setLines(prev => prev.map((l, idx) => idx !== rowIdx ? l : {
                  ...l,
                  _search: `${it.brandName} ${it.strength}`,
                  _open: false,

                  packSize: it.packSize,
                  costPrice: it.costPrice,
                  sellingPrice: it.sellingPrice,
                  freeQty: l.freeQty || "",
                  _scanResult: { matched: true, detected: `${result.detectedName} ${result.detectedStrength}`, confidence: result.confidence },

                _search: `${result.detectedName || ""} ${result.detectedStrength || ""}`.trim(),

          setScanningRow(null);
        };

        const TH = ({ children, w }) => (
          <th style={{ padding: "7px 10px", background: "#1e3a8a", color: "#fff", fontSize: 11, fontWeight: 700, whiteSpace: "nowrap", textAlign: "left", minWidth: w || 80 }}>
            {children}
          </th>
        );
        const TD = ({ children, center }) => (
          <td style={{ padding: "3px 5px", borderBottom: "1px solid #e5e7eb", verticalAlign: "middle", textAlign: center ? "center" : "left" }}>
            {children}
          </td>
        );
        const numStyle = { width: "100%", padding: "6px 8px", border: "1px solid #d1d5db", borderRadius: 6, fontSize: 12, boxSizing: "border-box", background: "#fff" };

        return (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.55)", zIndex: 1000, overflowY: "auto", padding: "16px 8px" }}>
            <div style={{ background: "#f8fafc", maxWidth: 1150, margin: "0 auto", borderRadius: 16, overflow: "hidden", boxShadow: "0 8px 40px rgba(0,0,0,.2)" }}>

              {/* Title Bar */}
              <div style={{ background: "linear-gradient(90deg,#1e3a8a,#1d4ed8)", color: "#fff", padding: "14px 20px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontWeight: 800, fontSize: 16 }}>📥 Goods Received Note (GRN)</div>
                  <div style={{ fontSize: 11, opacity: 0.8 }}>Sesanda Pharmacy • Enter / Tab to navigate rows</div>
                </div>
                <button onClick={() => { setModal(null); setLines([]); setForm({}); setQuickSup(false); setSupForm({}); }}
                  style={{ background: "rgba(255,255,255,.15)", border: "none", color: "#fff", width: 32, height: 32, borderRadius: 8, cursor: "pointer", fontSize: 18 }}>✕</button>
              </div>

              <div style={{ padding: "16px 20px" }}>

                {/* ── GRN Header ── */}
                <div style={{ background: "#fff", borderRadius: 12, padding: 16, marginBottom: 16, border: "1px solid #e5e7eb" }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#1d4ed8", marginBottom: 12, letterSpacing: 1 }}>GRN HEADER</div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12 }}>
                    {/* Date */}
                    <div>
                      <label style={{ fontSize: 11, color: "#6b7280", fontWeight: 600, display: "block", marginBottom: 4 }}>Date *</label>
                      <input type="date" value={form.date || today()} onChange={e => setForm({ ...form, date: e.target.value })}
                        style={{ width: "100%", padding: "8px 10px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 13, boxSizing: "border-box" }} />
                    </div>
                    {/* GRN Number */}
                    <div>
                      <label style={{ fontSize: 11, color: "#6b7280", fontWeight: 600, display: "block", marginBottom: 4 }}>GRN Number</label>
                      <div style={{ padding: "8px 10px", background: "#f3f4f6", border: "1px solid #e5e7eb", borderRadius: 8, fontSize: 13, fontFamily: "monospace", color: "#374151", fontWeight: 700 }}>
                        Auto-generated
                      </div>
                    </div>
                    {/* Invoice No */}
                    <div>
                      <label style={{ fontSize: 11, color: "#6b7280", fontWeight: 600, display: "block", marginBottom: 4 }}>Supplier Invoice No.</label>
                      <input value={form.invoiceNo || ""} onChange={e => setForm({ ...form, invoiceNo: e.target.value })}
                        placeholder="e.g. INV-2025-001"
                        style={{ width: "100%", padding: "8px 10px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 13, boxSizing: "border-box" }} />
                    </div>
                    {/* Supplier with Quick Add */}
                    <div>
                      <label style={{ fontSize: 11, color: "#6b7280", fontWeight: 600, display: "block", marginBottom: 4 }}>Supplier *</label>
                      <div style={{ display: "flex", gap: 6 }}>
                        <select value={form.supplierId || ""} onChange={e => setForm({ ...form, supplierId: e.target.value })}
                          style={{ flex: 1, padding: "8px 10px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 13, boxSizing: "border-box" }}>
                          <option value="">Select supplier...</option>
                          {db.suppliers.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                        </select>
                        <button onClick={() => setQuickSup(true)} title="Quick Add Supplier"
                          style={{ padding: "8px 10px", background: "#1d4ed8", color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 16, whiteSpace: "nowrap" }}>
                          ➕
                        </button>
                      </div>
                      {form.supplierId && (() => {
                        const s = db.suppliers.find(x => x.id === form.supplierId);
                        return s ? <div style={{ fontSize: 10, color: "#059669", marginTop: 3 }}>📞 {s.contact} {s.paymentTerms ? `• ${s.paymentTerms}` : ""}</div> : null;
                      })()}
                    </div>
                  </div>

                  {/* Quick Add Supplier inline panel */}
                  {quickSup && (
                    <div style={{ marginTop: 14, background: "#eff6ff", border: "2px solid #bfdbfe", borderRadius: 10, padding: 14 }}>
                      <div style={{ fontWeight: 700, fontSize: 12, color: "#1d4ed8", marginBottom: 10 }}>➕ Quick Add Supplier</div>
                      <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr", gap: 10 }}>
                        <div>
                          <label style={{ fontSize: 11, color: "#374151", fontWeight: 600, display: "block", marginBottom: 3 }}>Company Name *</label>
                          <input value={supForm.name || ""} onChange={e => setSupForm({ ...supForm, name: e.target.value })}
                            placeholder="e.g. ABC Pharma Ltd"
                            autoFocus
                            style={{ width: "100%", padding: "7px 10px", border: "1px solid #93c5fd", borderRadius: 7, fontSize: 13, boxSizing: "border-box" }} />
                        </div>
                        <div>
                          <label style={{ fontSize: 11, color: "#374151", fontWeight: 600, display: "block", marginBottom: 3 }}>Contact No.</label>
                          <input value={supForm.contact || ""} onChange={e => setSupForm({ ...supForm, contact: e.target.value })}
                            placeholder="0112345678"
                            style={{ width: "100%", padding: "7px 10px", border: "1px solid #93c5fd", borderRadius: 7, fontSize: 13, boxSizing: "border-box" }} />
                        </div>
                        <div>
                          <label style={{ fontSize: 11, color: "#374151", fontWeight: 600, display: "block", marginBottom: 3 }}>Email</label>
                          <input value={supForm.email || ""} onChange={e => setSupForm({ ...supForm, email: e.target.value })}
                            placeholder="info@company.lk"
                            style={{ width: "100%", padding: "7px 10px", border: "1px solid #93c5fd", borderRadius: 7, fontSize: 13, boxSizing: "border-box" }} />
                        </div>
                        <div>
                          <label style={{ fontSize: 11, color: "#374151", fontWeight: 600, display: "block", marginBottom: 3 }}>Payment Terms</label>
                          <select value={supForm.paymentTerms || "30 days"} onChange={e => setSupForm({ ...supForm, paymentTerms: e.target.value })}
                            style={{ width: "100%", padding: "7px 10px", border: "1px solid #93c5fd", borderRadius: 7, fontSize: 13, boxSizing: "border-box" }}>
                            {["Cash", "15 days", "30 days", "45 days", "60 days"].map(t => <option key={t}>{t}</option>)}
                          </select>
                        </div>
                      </div>
                      <div style={{ display: "flex", gap: 8, marginTop: 10, justifyContent: "flex-end" }}>
                        <button onClick={() => { setQuickSup(false); setSupForm({}); }}
                          style={{ padding: "6px 14px", borderRadius: 7, border: "1px solid #d1d5db", background: "#fff", cursor: "pointer", fontSize: 12 }}>Cancel</button>
                        <button onClick={saveQuickSupplier}
                          style={{ padding: "6px 14px", borderRadius: 7, border: "none", background: "#1d4ed8", color: "#fff", cursor: "pointer", fontSize: 12, fontWeight: 700 }}>
                          ✓ Save Supplier
                        </button>
                      </div>
                    </div>
                  )}
                </div>

                {/* ── Item Entry Sheet ── */}

                  <div style={{ padding: "10px 16px", borderBottom: "1px solid #e5e7eb", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div>
                      <span style={{ fontSize: 12, fontWeight: 700, color: "#1d4ed8", letterSpacing: 1 }}>ITEM ENTRY</span>
                      <span style={{ fontSize: 10, color: "#9ca3af", marginLeft: 8 }}>Enter / Tab → next field</span>
                    </div>
                    <button onClick={() => {
                      setLines(prev => [...prev, { itemId: "", itemCode: "", itemName: "", packSize: "", qty: "", costPrice: "", sellingPrice: "", freeQty: "", _search: "" }]);
                      setTimeout(() => document.getElementById(cellRef(lines.length, 0))?.focus(), 50);
                    }}
                      style={{ padding: "6px 14px", background: "#059669", color: "#fff", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 13, fontWeight: 700 }}>
                      + Add Row
                    </button>
                  </div>

                  {lines.length === 0 && (
                    <div style={{ textAlign: "center", padding: 28, color: "#9ca3af", fontSize: 13 }}>
                      Click "+ Add Row" to start entering items
                    </div>
                  )}

                  {lines.map((l, i) => {
                    const billQty = Math.max(0, (+l.qty || 0) - (+l.freeQty || 0));
                    const lineTotal = billQty * (+l.costPrice || 0);
                    const q = (l._search || "").toLowerCase();
                    const matchedItems = q.length > 0 ? db.items.filter(it =>
                      it.brandName?.toLowerCase().includes(q) ||
                      it.genericName?.toLowerCase().includes(q) ||
                      it.itemCode?.includes(q) ||
                      it.strength?.toLowerCase().includes(q)
                    ) : [];

                    const inStyle = { width: "100%", padding: "7px 10px", border: "1px solid #d1d5db", borderRadius: 7, fontSize: 13, boxSizing: "border-box", background: "#fff" };
                    const roStyle = { padding: "7px 10px", background: "#f3f4f6", border: "1px solid #e5e7eb", borderRadius: 7, fontSize: 12, color: "#374151", minHeight: 34 };
                    const lbl = (t) => <div style={{ fontSize: 10, color: "#6b7280", fontWeight: 700, marginBottom: 3, letterSpacing: 0.5 }}>{t}</div>;

                    return (
                      <div key={i} style={{ padding: "12px 14px", borderBottom: "1px solid #f0f0f0", background: i % 2 === 0 ? "#fff" : "#fafafa" }}>
                        {/* Row header */}
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            <span style={{ background: "#1e3a8a", color: "#fff", borderRadius: 6, padding: "2px 8px", fontSize: 11, fontWeight: 700 }}>#{i + 1}</span>
                            {l.itemCode && <span style={{ fontFamily: "monospace", fontSize: 12, fontWeight: 800, color: "#1e3a8a", background: "#eff6ff", padding: "2px 8px", borderRadius: 5 }}>{l.itemCode}</span>}
                            {l.packSize && <span style={{ fontSize: 11, color: "#059669", fontWeight: 600 }}>{l.packSize}</span>}
                          </div>
                          <button onClick={() => setLines(lines.filter((_, idx) => idx !== i))}
                            style={{ background: "#fee2e2", border: "none", color: "#dc2626", width: 28, height: 28, borderRadius: 6, cursor: "pointer", fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center" }}>✕</button>
                        </div>

                        {/* Item Name search */}
                        <div style={{ marginBottom: 8, position: "relative" }}>
                          {lbl("ITEM NAME")}
                          <div style={{ display: "flex", gap: 8 }}>
                            <div style={{ flex: 1, position: "relative" }}>
                              <input
                                id={cellRef(i, 0)}
                                value={l._search !== undefined ? l._search : ""}
                                onChange={e => {
                                  const val = e.target.value;
                                  if (!val) { setLines(prev => prev.map((x, idx) => idx !== i ? x : { ...x, _search: "", itemId: "", itemCode: "", packSize: "", costPrice: "", sellingPrice: "", _open: false })); return; }
                                  handleNameSearch(i, val);
                                }}
                                onFocus={() => setLines(prev => prev.map((x, idx) => idx === i ? { ...x, _open: true } : x))}
                                onBlur={() => {
                                  setTimeout(() => setLines(prev => prev.map((x, idx) => {
                                    if (idx !== i) return x;
                                    if (x._search && !x.itemId) return { ...x, _search: "", _open: false };
                                    return { ...x, _open: false };
                                  })), 300);
                                }}
                                onKeyDown={e => {
                                  if (e.key === "Enter" && matchedItems.length === 1) { handleItemPick(i, matchedItems[0]); return; }
                                  if (e.key === "Enter" && l.itemId) { e.preventDefault(); focusCell(i, 1); return; }
                                  if (e.key === "Tab") { e.preventDefault(); if (l.itemId) focusCell(i, 1); }
                                  if (e.key === "Escape") setLines(prev => prev.map((x, idx) => idx === i ? { ...x, _open: false } : x));
                                }}
                                placeholder="Type brand name, generic name or code..."
                                style={{ ...inStyle, border: l.itemId ? "2px solid #059669" : l._search ? "2px solid #f59e0b" : "2px solid #d1d5db", background: l.itemId ? "#f0fdf4" : "#fff", fontSize: 14, width: "100%" }}
                              />

                              {/* ✅ Selected chip */}
                              {l.itemId && (() => {
                                const it = db.items.find(x => x.id === l.itemId);
                                return it ? (
                                  <div style={{ marginTop: 4, display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                                    <span style={{ fontFamily: "monospace", fontSize: 11, background: "#eff6ff", padding: "2px 7px", borderRadius: 5, color: "#1e3a8a", fontWeight: 800 }}>{it.itemCode}</span>
                                    <span style={{ fontSize: 12, fontWeight: 700, color: "#065f46" }}>{it.brandName} {it.strength}</span>
                                    <span style={{ fontSize: 11, color: "#6b7280" }}>{it.packSize}</span>
                                    <button onMouseDown={e => { e.preventDefault(); setLines(prev => prev.map((x, idx) => idx !== i ? x : { ...x, itemId: "", itemCode: "", _search: "", packSize: "", costPrice: "", sellingPrice: "", _open: false })); setTimeout(() => document.getElementById(cellRef(i, 0))?.focus(), 30); }}
                                      style={{ marginLeft: "auto", background: "#fee2e2", border: "none", color: "#dc2626", borderRadius: 5, padding: "1px 7px", cursor: "pointer", fontSize: 12, fontWeight: 700 }}>✕ change</button>
                                  </div>
                                ) : null;
                              })()}

                              {/* ⛔ No match */}
                              {!l.itemId && l._search && l._search.length > 1 && matchedItems.length === 0 && (
                                <div style={{ marginTop: 4, padding: "6px 10px", background: "#fee2e2", border: "1px solid #fca5a5", borderRadius: 7, fontSize: 12, color: "#dc2626", fontWeight: 600 }}>
                                  ⛔ "{l._search}" inventory ගාව නෑ — list ගාව select කරන්න
                                </div>
                              )}

                              {/* Dropdown */}
                              {l._open && !l.itemId && matchedItems.length > 0 && (
                                <div style={{ position: "absolute", top: "100%", left: 0, right: 0, background: "#fff", border: "2px solid #1d4ed8", borderRadius: 10, boxShadow: "0 8px 32px rgba(0,0,0,.18)", zIndex: 300, maxHeight: 260, overflowY: "auto" }}>
                                  <div style={{ padding: "6px 12px", background: "#eff6ff", fontSize: 10, color: "#1d4ed8", fontWeight: 700, borderBottom: "1px solid #dbeafe" }}>
                                    {matchedItems.length} item{matchedItems.length > 1 ? "s" : ""} found — tap to select
                                  </div>
                                  {matchedItems.map(it => (
                                    <div key={it.id}
                                      onMouseDown={e => { e.preventDefault(); handleItemPick(i, it); }}
                                      onTouchEnd={e => { e.preventDefault(); handleItemPick(i, it); }}
                                      style={{ padding: "12px 14px", cursor: "pointer", borderBottom: "1px solid #f3f4f6", userSelect: "none", WebkitUserSelect: "none" }}>
                                      <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap", marginBottom: 2 }}>
                                        <span style={{ fontFamily: "monospace", fontSize: 12, background: "#eff6ff", padding: "2px 7px", borderRadius: 5, color: "#1e3a8a", fontWeight: 800 }}>{it.itemCode}</span>
                                        <span style={{ fontWeight: 800, fontSize: 15, color: "#111" }}>{it.brandName}</span>
                                        <span style={{ color: "#1d4ed8", fontSize: 14, fontWeight: 700 }}>{it.strength}</span>
                                      </div>
                                      <div style={{ fontSize: 12, color: "#6b7280" }}>{it.genericName} • {it.packSize} • Cost: Rs.{it.costPrice} / Sell: Rs.{it.sellingPrice}</div>
                                    </div>
                                  ))}
                                </div>
                              )}
                            </div>

                            {/* 📷 Camera / Gallery scan button */}
                            <label style={{
                              display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                              width: 60, minHeight: 50, borderRadius: 10, cursor: "pointer",
                              background: scanLoading && scanningRow === i ? "#fef3c7" : "#eff6ff",
                              border: `2px solid ${scanLoading && scanningRow === i ? "#f59e0b" : "#93c5fd"}`,
                              flexShrink: 0, transition: "all .2s",
                            }}>
                              <span style={{ fontSize: scanLoading && scanningRow === i ? 16 : 22 }}>
                                {scanLoading && scanningRow === i ? "⏳" : "📷"}
                              </span>
                              <span style={{ fontSize: 9, color: "#1d4ed8", fontWeight: 700, marginTop: 1 }}>
                                {scanLoading && scanningRow === i ? "scanning" : "photo"}
                              </span>
                              <input
                                type="file"
                                accept="image/*"
                                capture="environment"
                                onChange={e => { if(e.target.files[0]) scanItemPhoto(i, e.target.files[0]); e.target.value=""; }}
                                style={{ display: "none" }}
                              />
                            </label>
                          </div>

                          {/* Scan result feedback */}
                          {l._scanResult && (
                            <div style={{
                              marginTop: 5, padding: "6px 10px", borderRadius: 7, fontSize: 12, fontWeight: 600,
                              background: l._scanResult.matched ? "#d1fae5" : "#fef3c7",
                              color: l._scanResult.matched ? "#065f46" : "#92400e",
                              border: `1px solid ${l._scanResult.matched ? "#6ee7b7" : "#fde68a"}`,
                            }}>
                              {l._scanResult.matched
                                ? `✅ Detected: "${l._scanResult.detected}" — matched! (${l._scanResult.confidence} confidence)`
                                : `⚠️ Detected: "${l._scanResult.detected}" — not in inventory. Select manually above.`
                              }
                            </div>
                          )}
                        </div>

                        {/* Numeric fields grid */}
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8 }}>
                          <div>
                            {lbl("QTY (PACKS)")}
                            <input id={cellRef(i, 1)} type="number" value={l.qty}
                              onChange={e => setLines(prev => prev.map((x, idx) => idx === i ? { ...x, qty: e.target.value } : x))}
                              onKeyDown={e => { if (e.key === "Enter" || e.key === "Tab") { e.preventDefault(); focusCell(i, 2); } }}
                              onFocus={e => e.target.select()}
                              placeholder="0"
                              style={{ ...inStyle, textAlign: "right", fontWeight: 700 }} />
                          </div>
                          <div>
                            {lbl("COST/PACK")}
                            <input id={cellRef(i, 2)} type="number" value={l.costPrice}
                              onChange={e => setLines(prev => prev.map((x, idx) => idx === i ? { ...x, costPrice: e.target.value } : x))}
                              onKeyDown={e => { if (e.key === "Enter" || e.key === "Tab") { e.preventDefault(); focusCell(i, 3); } }}
                              onFocus={e => e.target.select()}
                              placeholder="0.00"
                              style={{ ...inStyle, textAlign: "right" }} />
                          </div>
                          <div>
                            {lbl("SELL/PACK")}
                            <input id={cellRef(i, 3)} type="number" value={l.sellingPrice}
                              onChange={e => setLines(prev => prev.map((x, idx) => idx === i ? { ...x, sellingPrice: e.target.value } : x))}
                              onKeyDown={e => { if (e.key === "Enter" || e.key === "Tab") { e.preventDefault(); focusCell(i, 4); } }}
                              onFocus={e => e.target.select()}
                              placeholder="0.00"
                              style={{ ...inStyle, textAlign: "right" }} />
                          </div>
                          <div>
                            {lbl("FREE QTY")}
                            <input id={cellRef(i, 4)} type="number" value={l.freeQty || ""}
                              onChange={e => setLines(prev => prev.map((x, idx) => idx === i ? { ...x, freeQty: e.target.value } : x))}
                              onKeyDown={e => { if (e.key === "Enter" || e.key === "Tab") { e.preventDefault(); focusCell(i, 5); } }}
                              onFocus={e => e.target.select()}
                              placeholder="0"
                              style={{ ...inStyle, textAlign: "right" }} />
                          </div>
                        </div>

                        {/* Line total */}
                        {lineTotal > 0 && (
                          <div style={{ marginTop: 8, display: "flex", justifyContent: "flex-end", alignItems: "center", gap: 8 }}>
                            <span style={{ fontSize: 11, color: "#6b7280" }}>Bill: {billQty} packs ×  Rs.{+l.costPrice || 0} =</span>
                            <span style={{ fontWeight: 800, fontSize: 15, color: "#065f46", background: "#f0fdf4", padding: "3px 12px", borderRadius: 8, border: "1px solid #bbf7d0" }}>
                              Rs. {lineTotal.toLocaleString("en-LK", { minimumFractionDigits: 2 })}
                            </span>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>

                {/* ── Summary + Payment ── */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                  {/* Payment */}
                  <div style={{ background: "#fff", borderRadius: 12, padding: 16, border: "1px solid #e5e7eb" }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: "#1d4ed8", marginBottom: 12, letterSpacing: 1 }}>PAYMENT METHOD</div>
                    <div style={{ display: "flex", gap: 10 }}>
                      {[{ key: "cash", label: "💵 Cash", color: "#059669" }, { key: "cheque", label: "🏦 Cheque", color: "#1d4ed8" }, { key: "credit", label: "📋 Credit", color: "#d97706" }].map(p => (
                        <button key={p.key} onClick={() => setForm({ ...form, paymentMethod: p.key })}
                          style={{ flex: 1, padding: "10px 6px", borderRadius: 10, cursor: "pointer", fontWeight: 700, fontSize: 13,
                            border: form.paymentMethod === p.key ? `2px solid ${p.color}` : "2px solid #e5e7eb",
                            background: form.paymentMethod === p.key ? p.color : "#f9fafb",
                            color: form.paymentMethod === p.key ? "#fff" : "#374151" }}>
                          {p.label}
                        </button>
                      ))}
                    </div>
                    {form.paymentMethod === "cheque" && (
                      <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 6 }}>
                        <input value={form.chequeNo || ""} onChange={e => setForm({ ...form, chequeNo: e.target.value })}
                          placeholder="Cheque Number"
                          style={{ width: "100%", padding: "7px 10px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 13, boxSizing: "border-box" }} />
                        <input type="date" value={form.chequeDate || ""} onChange={e => setForm({ ...form, chequeDate: e.target.value })}
                          style={{ width: "100%", padding: "7px 10px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 13, boxSizing: "border-box" }} />
                      </div>
                    )}
                    <textarea value={form.notes || ""} onChange={e => setForm({ ...form, notes: e.target.value })}
                      placeholder="Notes..." rows={2}
                      style={{ marginTop: 10, width: "100%", padding: "7px 10px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 12, boxSizing: "border-box", resize: "none" }} />
                  </div>

                  {/* Summary */}
                  <div style={{ background: "#1e3a8a", borderRadius: 12, padding: 16, color: "#fff" }}>
                    <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 14, letterSpacing: 1, opacity: 0.8 }}>GRN SUMMARY</div>
                    {[
                      { label: "Total Item Types", value: lines.filter(l => l.itemId).length },
                      { label: "Total Packs Received", value: totalPacks },
                      { label: "Total Free Packs", value: lines.reduce((a, l) => a + (+l.freeQty || 0), 0) },
                      { label: "Billable Packs", value: lines.reduce((a, l) => a + Math.max(0, (+l.qty || 0) - (+l.freeQty || 0)), 0) },
                    ].map(r => (
                      <div key={r.label} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, paddingBottom: 7, marginBottom: 7, borderBottom: "1px solid rgba(255,255,255,.1)" }}>
                        <span style={{ opacity: 0.75 }}>{r.label}</span>
                        <span style={{ fontWeight: 700 }}>{r.value}</span>
                      </div>
                    ))}
                    <div style={{ display: "flex", justifyContent: "space-between", marginTop: 10, paddingTop: 10, borderTop: "2px solid rgba(255,255,255,.3)" }}>
                      <span style={{ fontSize: 15, fontWeight: 700 }}>TOTAL COST</span>
                      <span style={{ fontSize: 20, fontWeight: 800, color: "#6ee7b7" }}>
                        Rs. {grnTotal.toLocaleString("en-LK", { minimumFractionDigits: 2 })}
                      </span>
                    </div>
                  </div>
                </div>

                {/* Actions */}
                <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 16 }}>
                  <button onClick={() => { setModal(null); setLines([]); setForm({}); setQuickSup(false); setSupForm({}); }}
                    style={{ padding: "10px 24px", borderRadius: 8, border: "1px solid #e5e7eb", background: "#fff", cursor: "pointer", fontWeight: 600, fontSize: 14 }}>
                    Cancel
                  </button>
                  <button onClick={saveGRN} disabled={lines.filter(l => l.itemId).length === 0}
                    style={{ padding: "10px 28px", borderRadius: 8, border: "none", background: lines.filter(l => l.itemId).length === 0 ? "#9ca3af" : "#059669", color: "#fff", cursor: "pointer", fontWeight: 700, fontSize: 14 }}>
                    ✅ Save GRN
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Invoice Modal */}
      {modal === "invoice" && (() => {
        const invTotal = lines.reduce((a, l) => {
          if (!l.itemId) return a;
          const it = db.items.find(x => x.id === l.itemId);
          const packUnits = it ? parseInt((it.packSize || "1").replace(/\D.*/, ""), 10) || 1 : 1;
          const batches = db.stock.filter(s => s.itemId === l.itemId && s.qty > 0);
          const selBatch = batches.find(b => b.id === l.batchId) || batches[0];
          // Use batch-specific selling price
          const packPrice = +(selBatch?.sellingPrice || it?.sellingPrice || 0);
          const perUnit = l.unitPrice !== undefined ? +l.unitPrice : (packPrice / packUnits);
          return a + (+l.qtyUnits || 0) * perUnit;
        }, 0);

        // Credit balance for selected customer
        const customerCredit = form.customerId ? (() => {
          const creditInvs = db.invoices.filter(i => i.customerId === form.customerId && i.paymentMethod === "credit");
          const paid = db.invoices.filter(i => i.customerId === form.customerId && i.paymentMethod !== "credit").reduce((a, b) => a + b.total, 0);
          return creditInvs.reduce((a, b) => a + b.total, 0);
        })() : 0;

        // Item name search state per invoice line
        const handleInvNameSearch = (i, val) => {
          setLines(prev => prev.map((l, idx) => idx !== i ? l : { ...l, _search: val, itemId: "", sellingPrice: "" }));
        };
        const handleInvItemPick = (i, it) => {
          setLines(prev => prev.map((l, idx) => idx !== i ? l : {
            ...l,
            _search: `${it.brandName} ${it.strength}`,
            _open: false,
            itemId: it.id,
            sellingPrice: it.sellingPrice,
            qty: l.qty || 1,
          }));
          setTimeout(() => document.getElementById(`inv_qty_${i}`)?.focus(), 30);
        };

        // Camera scan for invoice
        const scanInvPhoto = async (rowIdx, file) => {
          if (!file) return;
          setScanLoading(true); setScanningRow(rowIdx);
          try {
            const base64 = await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result.split(",")[1]); r.onerror = rej; r.readAsDataURL(file); });
            const itemList = db.items.map(it => `ID:${it.id}|Code:${it.itemCode}|Brand:${it.brandName}|Generic:${it.genericName}|Strength:${it.strength}|Pack:${it.packSize}`).join("\n");
            const res = await fetch("https://api.anthropic.com/v1/messages", {
              method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                model: "claude-sonnet-4-6", max_tokens: 300,
                system: `Pharmacy assistant. Identify medicine from photo and match to inventory:\n${itemList}\nRespond ONLY with JSON: {"itemId":"<id or empty>","detectedName":"<brand>","detectedStrength":"<strength>","confidence":"high|medium|low"}`,
                messages: [{ role: "user", content: [{ type: "image", source: { type: "base64", media_type: file.type || "image/jpeg", data: base64 } }, { type: "text", text: "Identify and match." }] }]
              })
            });
            const data = await res.json();
            const result = JSON.parse(data.content?.map(b => b.text || "").join("").replace(/```json|```/g, "").trim() || "{}");
            if (result.itemId) {
              const it = db.items.find(x => x.id === result.itemId);
              if (it) handleInvItemPick(rowIdx, it);
            } else {
              setLines(prev => prev.map((l, idx) => idx !== rowIdx ? l : { ...l, _search: `${result.detectedName || ""} ${result.detectedStrength || ""}`.trim(), _open: true }));
            }
          } catch { alert("Scan failed. Try again."); }
          setScanLoading(false); setScanningRow(null);
        };

        return (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.55)", zIndex: 1000, overflowY: "auto", padding: "16px 8px" }}>
            <div style={{ background: "#f8fafc", maxWidth: 700, margin: "0 auto", borderRadius: 16, overflow: "hidden", boxShadow: "0 8px 40px rgba(0,0,0,.2)" }}>

              {/* Title */}
              <div style={{ background: "linear-gradient(90deg,#065f46,#059669)", color: "#fff", padding: "14px 20px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontWeight: 800, fontSize: 16 }}>🧾 New Invoice</div>
                  <div style={{ fontSize: 11, opacity: 0.8 }}>Sesanda Pharmacy</div>
                </div>
                <button onClick={() => { setModal(null); setLines([]); setForm({}); }}
                  style={{ background: "rgba(255,255,255,.15)", border: "none", color: "#fff", width: 32, height: 32, borderRadius: 8, cursor: "pointer", fontSize: 18 }}>✕</button>
              </div>

              <div style={{ padding: "16px 20px" }}>

                {/* Header */}
                <div style={{ background: "#fff", borderRadius: 12, padding: 14, marginBottom: 14, border: "1px solid #e5e7eb" }}>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
                    <div>
                      <label style={{ fontSize: 11, color: "#6b7280", fontWeight: 600, display: "block", marginBottom: 4 }}>Date *</label>
                      <input type="date" value={form.date || today()} onChange={e => setForm({ ...form, date: e.target.value })}
                        style={{ width: "100%", padding: "8px 10px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 13, boxSizing: "border-box" }} />
                    </div>
                    <div>
                      <label style={{ fontSize: 11, color: "#6b7280", fontWeight: 600, display: "block", marginBottom: 4 }}>Invoice No.</label>
                      <div style={{ padding: "8px 10px", background: "#f3f4f6", borderRadius: 8, fontSize: 13, fontFamily: "monospace", fontWeight: 700, color: "#374151" }}>Auto-generated</div>
                    </div>
                  </div>

                  {/* Customer + credit warning */}
                  <div>
                    <label style={{ fontSize: 11, color: "#6b7280", fontWeight: 600, display: "block", marginBottom: 4 }}>Customer</label>
                    <select value={form.customerId || ""} onChange={e => setForm({ ...form, customerId: e.target.value })}
                      style={{ width: "100%", padding: "8px 10px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 13, boxSizing: "border-box" }}>
                      <option value="">Walk-in Customer</option>
                      {db.customers.map(c => <option key={c.id} value={c.id}>{c.name} — {c.phone}</option>)}
                    </select>
                    {/* Credit balance warning */}
                    {form.customerId && customerCredit > 0 && (
                      <div style={{ marginTop: 8, padding: "10px 14px", background: "#fef3c7", border: "2px solid #f59e0b", borderRadius: 10, display: "flex", gap: 10, alignItems: "center" }}>
                        <span style={{ fontSize: 22 }}>⚠️</span>
                        <div>
                          <div style={{ fontWeight: 800, color: "#92400e", fontSize: 13 }}>Outstanding Credit Balance</div>
                          <div style={{ color: "#b45309", fontSize: 12 }}>
                            {db.customers.find(c => c.id === form.customerId)?.name} has unpaid credit of{" "}
                            <strong style={{ fontSize: 15 }}>Rs. {customerCredit.toLocaleString("en-LK", { minimumFractionDigits: 2 })}</strong>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                </div>

                {/* Item Lines */}
                <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #e5e7eb", overflow: "hidden", marginBottom: 14 }}>
                  <div style={{ padding: "10px 16px", borderBottom: "1px solid #e5e7eb", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ fontSize: 12, fontWeight: 700, color: "#059669", letterSpacing: 1 }}>ITEMS</span>
                    <button onClick={() => setLines(prev => [...prev, { itemId: "", _search: "", qty: 1, sellingPrice: "" }])}
                      style={{ padding: "5px 14px", background: "#059669", color: "#fff", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 12, fontWeight: 700 }}>+ Add Item</button>
                  </div>

                  {lines.length === 0 && <div style={{ textAlign: "center", padding: 24, color: "#9ca3af" }}>Click "+ Add Item" to start</div>}

                  {lines.map((l, i) => {
                    const stock = l.itemId ? getStock(l.itemId) : 0;
                    const insufficient = l.itemId && (+l.qty || 0) > stock;
                    const lineTotal = (+l.qty || 0) * (+l.sellingPrice || 0);
                    const q = (l._search || "").toLowerCase();
                    const matchedItems = q.length > 0 ? db.items.filter(it =>
                      it.brandName?.toLowerCase().includes(q) ||
                      it.genericName?.toLowerCase().includes(q) ||
                      it.itemCode?.includes(q) ||
                      it.strength?.toLowerCase().includes(q)
                    ) : [];

                    return (
                      <div key={i} style={{ padding: "12px 14px", borderBottom: "1px solid #f0f0f0", background: insufficient ? "#fff5f5" : i % 2 === 0 ? "#fff" : "#fafafa" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                          <span style={{ background: "#059669", color: "#fff", borderRadius: 6, padding: "2px 8px", fontSize: 11, fontWeight: 700 }}>#{i + 1}</span>
                          <button onClick={() => setLines(lines.filter((_, idx) => idx !== i))}
                            style={{ background: "#fee2e2", border: "none", color: "#dc2626", width: 28, height: 28, borderRadius: 6, cursor: "pointer", fontSize: 16 }}>✕</button>
                        </div>

                        {/* Item Name search */}
                        <div style={{ marginBottom: 8, position: "relative" }}>
                          <div style={{ fontSize: 10, color: "#6b7280", fontWeight: 700, marginBottom: 3 }}>ITEM NAME / CODE</div>
                          <div style={{ display: "flex", gap: 8 }}>
                            <div style={{ flex: 1, position: "relative" }}>
                              <input
                                id={`inv_item_${i}`}
                                value={l._search || ""}
                                onChange={e => {
                                  const val = e.target.value;
                                  handleInvNameSearch(i, val);
                                  // if cleared, reset selection
                                  if (!val) setLines(prev => prev.map((x, idx) => idx !== i ? x : { ...x, itemId: "", sellingPrice: "" }));
                                }}
                                onFocus={() => setLines(prev => prev.map((x, idx) => idx === i ? { ...x, _open: true } : x))}
                                onBlur={() => {
                                  setTimeout(() => {
                                    setLines(prev => prev.map((x, idx) => {
                                      if (idx !== i) return x;
                                      // if typed something but no item selected → clear field
                                      if (x._search && !x.itemId) return { ...x, _search: "", _open: false, _noMatch: false };
                                      return { ...x, _open: false };
                                    }));
                                  }, 300);
                                }}
                                onKeyDown={e => {
                                  if (e.key === "Enter") {
                                    if (matchedItems.length === 1) { handleInvItemPick(i, matchedItems[0]); return; }
                                    if (l.itemId) { e.preventDefault(); document.getElementById(`inv_qty_${i}`)?.focus(); }
                                  }
                                  if (e.key === "Tab") { e.preventDefault(); if (l.itemId) document.getElementById(`inv_qty_${i}`)?.focus(); }
                                  if (e.key === "Escape") setLines(prev => prev.map((x, idx) => idx === i ? { ...x, _open: false } : x));
                                }}
                                placeholder="Type brand / generic / code..."
                                style={{
                                  width: "100%", padding: "10px 12px",
                                  border: l.itemId ? "2px solid #059669" : l._search ? "2px solid #f59e0b" : "2px solid #d1d5db",
                                  borderRadius: 8, fontSize: 14, boxSizing: "border-box",
                                  background: l.itemId ? "#f0fdf4" : "#fff",
                                }}
                              />

                              {/* ✅ Selected item chip */}
                              {l.itemId && (() => {
                                const it = db.items.find(x => x.id === l.itemId);
                                return it ? (
                                  <div style={{ marginTop: 4, display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                                    <span style={{ fontFamily: "monospace", fontSize: 11, background: "#eff6ff", padding: "2px 7px", borderRadius: 5, color: "#1e3a8a", fontWeight: 800 }}>{it.itemCode}</span>
                                    <span style={{ fontSize: 12, fontWeight: 700, color: "#065f46" }}>{it.brandName} {it.strength}</span>
                                    <span style={{ fontSize: 11, color: "#6b7280" }}>{it.packSize}</span>
                                    <button onMouseDown={e => { e.preventDefault(); setLines(prev => prev.map((x, idx) => idx !== i ? x : { ...x, itemId: "", _search: "", sellingPrice: "", _open: false })); setTimeout(() => document.getElementById(`inv_item_${i}`)?.focus(), 30); }}
                                      style={{ marginLeft: "auto", background: "#fee2e2", border: "none", color: "#dc2626", borderRadius: 5, padding: "1px 7px", cursor: "pointer", fontSize: 12, fontWeight: 700 }}>✕ change</button>
                                  </div>
                                ) : null;
                              })()}

                              {/* ⚠️ No match warning */}
                              {!l.itemId && l._search && l._search.length > 1 && matchedItems.length === 0 && (
                                <div style={{ marginTop: 4, padding: "6px 10px", background: "#fee2e2", border: "1px solid #fca5a5", borderRadius: 7, fontSize: 12, color: "#dc2626", fontWeight: 600 }}>
                                  ⛔ "{l._search}" not found in inventory — select from list only
                                </div>
                              )}

                              {/* Dropdown */}
                              {l._open && !l.itemId && matchedItems.length > 0 && (
                                <div style={{ position: "absolute", top: "100%", left: 0, right: 0, background: "#fff", border: "2px solid #059669", borderRadius: 10, boxShadow: "0 8px 24px rgba(0,0,0,.18)", zIndex: 300, maxHeight: 260, overflowY: "auto" }}>
                                  <div style={{ padding: "5px 12px", background: "#f0fdf4", fontSize: 10, color: "#059669", fontWeight: 700, borderBottom: "1px solid #d1fae5" }}>
                                    {matchedItems.length} item{matchedItems.length > 1 ? "s" : ""} — tap to select
                                  </div>
                                  {matchedItems.map(it => {
                                    const st = getStock(it.id);
                                    return (
                                      <div key={it.id}
                                        onMouseDown={e => { e.preventDefault(); handleInvItemPick(i, it); }}
                                        onTouchEnd={e => { e.preventDefault(); handleInvItemPick(i, it); }}
                                        style={{ padding: "11px 14px", cursor: "pointer", borderBottom: "1px solid #f3f4f6", background: st === 0 ? "#fff5f5" : "#fff", userSelect: "none", WebkitUserSelect: "none" }}>
                                        <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap", marginBottom: 2 }}>
                                          <span style={{ fontFamily: "monospace", fontSize: 11, background: "#eff6ff", padding: "2px 6px", borderRadius: 4, color: "#1e3a8a", fontWeight: 800 }}>{it.itemCode}</span>
                                          <span style={{ fontWeight: 800, fontSize: 15 }}>{it.brandName}</span>
                                          <span style={{ color: "#1d4ed8", fontWeight: 700, fontSize: 14 }}>{it.strength}</span>
                                          <span style={{ marginLeft: "auto" }}>
                                            <Badge color={st === 0 ? "red" : st < 10 ? "yellow" : "green"}>
                                              {st === 0 ? "Out of Stock" : `${st} in stock`}
                                            </Badge>
                                          </span>
                                        </div>
                                        <div style={{ fontSize: 11, color: "#6b7280" }}>{it.genericName} • {it.packSize} • Rs.{it.sellingPrice}/pack</div>
                                      </div>
                                    );
                                  })}
                                </div>
                              )}
                            </div>

                            {/* Camera / Gallery scan */}
                            <label style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", width: 56, minHeight: 48, borderRadius: 8, cursor: "pointer", background: scanLoading && scanningRow === i ? "#fef3c7" : "#f0fdf4", border: `2px solid ${scanLoading && scanningRow === i ? "#f59e0b" : "#6ee7b7"}`, flexShrink: 0 }}>
                              <span style={{ fontSize: scanLoading && scanningRow === i ? 16 : 22 }}>{scanLoading && scanningRow === i ? "⏳" : "📷"}</span>
                              <span style={{ fontSize: 9, color: "#059669", fontWeight: 700 }}>{scanLoading && scanningRow === i ? "..." : "photo"}</span>
                              <input type="file" accept="image/*" capture="environment" onChange={e => { if(e.target.files[0]) scanInvPhoto(i, e.target.files[0]); e.target.value=""; }} style={{ display: "none" }} />
                            </label>
                          </div>
                        </div>

                        {/* Batch + Qty + Price */}
                        {l.itemId && (() => {
                          const it = db.items.find(x => x.id === l.itemId);
                          const batches = db.stock.filter(s => s.itemId === l.itemId && s.qty > 0)
                            .sort((a, b) => a.expiry < b.expiry ? -1 : 1);
                          const packUnits = it ? parseInt((it.packSize || "1").replace(/\D.*/, ""), 10) || 1 : 1;
                          const unitName = it ? (it.packSize || "").replace(/^\d+\s*/, "") || "units" : "units";
                          const selBatch = batches.find(b => b.id === l.batchId) || batches[0];
                          const selBatchUnits = (selBatch?.qty || 0) * packUnits;
                          const packPrice = +(selBatch?.sellingPrice || it?.sellingPrice || 0);
                          const perUnitPrice = packUnits > 0 ? (packPrice / packUnits) : packPrice;
                          const totalUnitsInStock = batches.reduce((a, b) => a + b.qty * packUnits, 0);
                          const enteredQty = +l.qtyUnits || 0;
                          const overflowQty = Math.max(0, enteredQty - selBatchUnits);
                          const batch1Qty = Math.min(enteredQty, selBatchUnits);
                          const nextBatch = batches.find(b => b.id !== selBatch?.id && b.qty > 0);
                          const nextPackPrice = nextBatch ? +(nextBatch.sellingPrice || it?.sellingPrice || 0) : 0;
                          const nextUnitPrice = packUnits > 0 ? nextPackPrice / packUnits : nextPackPrice;
                          const effectiveUnitPrice = l.unitPrice !== undefined ? +l.unitPrice : perUnitPrice;
                          const lineTotal = overflowQty > 0 && nextBatch
                            ? batch1Qty * effectiveUnitPrice + overflowQty * nextUnitPrice
                            : enteredQty * effectiveUnitPrice;
                          const costPerUnit = (+(selBatch?.costPrice || it?.costPrice || 0)) / packUnits;
                          const nextCostPerUnit = nextBatch ? (+(nextBatch.costPrice || it?.costPrice || 0)) / packUnits : 0;
                          const totalCost = overflowQty > 0 && nextBatch
                            ? batch1Qty * costPerUnit + overflowQty * nextCostPerUnit
                            : enteredQty * costPerUnit;
                          const profit = lineTotal - totalCost;

                          return (<>
                            {/* Batch selector */}
                            {batches.length > 0 && (
                              <div style={{ marginBottom: 8 }}>
                                <div style={{ fontSize: 10, color: "#6b7280", fontWeight: 700, marginBottom: 3 }}>BATCH — Selling Price Auto-fill</div>
                                <select value={l.batchId || (batches[0]?.id || "")}
                                  onChange={e => {
                                    const b = batches.find(x => x.id === e.target.value);
                                    setLines(prev => prev.map((x, idx) => idx !== i ? x : { ...x, batchId: e.target.value, sellingPrice: b?.sellingPrice || it?.sellingPrice || 0, unitPrice: undefined }));
                                  }}
                                  style={{ width: "100%", padding: "8px 10px", border: "2px solid #6ee7b7", borderRadius: 8, fontSize: 13, boxSizing: "border-box", background: "#f0fdf4" }}>
                                  {batches.map(b => (
                                    <option key={b.id} value={b.id}>
                                      [{b.batchNo}] Exp:{b.expiry} | {b.qty * packUnits} {unitName} | Rs.{((+(b.sellingPrice || it?.sellingPrice || 0)) / packUnits).toFixed(2)}/{unitName.replace(/s$/,"")}
                                    </option>
                                  ))}
                                </select>
                                <div style={{ fontSize: 11, color: "#6b7280", marginTop: 3, display: "flex", gap: 10 }}>
                                  <span>This batch: <strong style={{ color: "#1d4ed8" }}>{selBatchUnits} {unitName}</strong></span>
                                  <span>Total: <strong style={{ color: "#059669" }}>{totalUnitsInStock} {unitName}</strong></span>
                                </div>
                              </div>
                            )}

                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                              <div>
                                <div style={{ fontSize: 10, color: "#6b7280", fontWeight: 700, marginBottom: 3 }}>
                                  QTY ({unitName}) <span style={{ color: enteredQty > totalUnitsInStock ? "#dc2626" : "#059669" }}>Max:{totalUnitsInStock}</span>
                                </div>
                                <input id={`inv_qty_${i}`} type="number"
                                  value={l.qtyUnits || ""}
                                  min={0} max={totalUnitsInStock}
                                  onChange={e => {
                                    let v = Math.min(Math.max(0, +e.target.value), totalUnitsInStock);
                                    setLines(prev => prev.map((x, idx) => idx === i ? { ...x, qtyUnits: v || "" } : x));
                                  }}
                                  onFocus={e => e.target.select()}
                                  onKeyDown={e => { if (e.key==="Enter"||e.key==="Tab"){e.preventDefault();document.getElementById(`inv_price_${i}`)?.focus();} }}
                                  placeholder={`Max ${totalUnitsInStock}`}
                                  style={{ width: "100%", padding: "8px 10px", border: overflowQty > 0 ? "2px solid #f59e0b" : "1px solid #d1d5db", borderRadius: 8, fontSize: 14, boxSizing: "border-box", textAlign: "right", fontWeight: 700 }} />
                                {overflowQty > 0 && nextBatch && (
                                  <div style={{ marginTop: 4, padding: "4px 8px", background: "#fef3c7", border: "1px solid #fde68a", borderRadius: 6, fontSize: 11 }}>
                                    ⚡ {batch1Qty} [{selBatch?.batchNo}] + {overflowQty} [{nextBatch.batchNo}]
                                  </div>
                                )}
                                {enteredQty > 0 && <div style={{ fontSize: 10, color: "#9ca3af", marginTop: 2 }}>= {(enteredQty/packUnits).toFixed(2)} packs</div>}
                              </div>
                              <div>
                                <div style={{ fontSize: 10, color: "#6b7280", fontWeight: 700, marginBottom: 3 }}>PRICE/{unitName.replace(/s$/,"")} (Rs.)</div>
                                <input id={`inv_price_${i}`} type="number"
                                  value={l.unitPrice !== undefined ? l.unitPrice : perUnitPrice.toFixed(2)}
                                  onChange={e => setLines(prev => prev.map((x, idx) => idx === i ? { ...x, unitPrice: e.target.value } : x))}
                                  onFocus={e => e.target.select()}
                                  onKeyDown={e => { if (e.key==="Enter"||e.key==="Tab"){e.preventDefault();setLines(prev=>{if(!prev[i+1])return[...prev,{itemId:"",_search:"",qtyUnits:"",sellingPrice:""}];return prev;});setTimeout(()=>document.getElementById(`inv_item_${i+1}`)?.focus(),40);} }}
